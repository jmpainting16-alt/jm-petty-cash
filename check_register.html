<style>
  :root{
    --bg:#F5F2EB;--surface:#FFFFFF;--surface-2:#FAF7F0;
    --line:#E5DFCE;--ink:#0F1836;--muted:#6B7280;
    --navy:#1B2A5B;--navy-2:#243668;--navy-3:#0F1836;--navy-soft:#E4E8F2;
    --gold:#B8894A;--gold-2:#D4A574;--gold-3:#9E7239;--gold-soft:#F5EDD9;
    --success:#15803D;--success-soft:#E4F0E5;
    --danger:#B4421F;--danger-soft:#FBEAE3;
    --warn:#B45309;--warn-soft:#FDF1DE;
    --info:#1E4B7A;--info-soft:#DFEBF6;
    --yellow:#FFCE3A;
    --shadow:0 1px 2px rgba(15,24,54,.06),0 6px 18px rgba(15,24,54,.06);
    --shadow-lg:0 4px 8px rgba(15,24,54,.08),0 16px 32px rgba(15,24,54,.10);
    --font:'IBM Plex Sans Thai','Sarabun',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:0}
  a{color:inherit;text-decoration:none}
  input,select,textarea{font-family:inherit}

  .top{position:sticky;top:0;z-index:30;background:rgba(245,242,235,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 0}
  .top-in{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:12px}
  .back-btn{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--line);color:var(--navy);display:inline-flex;align-items:center;gap:6px}
  .top-title{font-weight:700;font-size:16px;color:var(--navy);flex:1}
  .top-title span{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.15em;text-transform:uppercase;display:block}

  .wrap{max-width:1180px;margin:0 auto;padding:20px}
  .btn{padding:9px 14px;border-radius:9px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
  .btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;box-shadow:0 2px 6px rgba(27,42,91,.20)}
  .btn-primary:hover{transform:translateY(-1px)}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-3));color:#fff}
  .btn-danger{background:var(--danger-soft);color:var(--danger)}
  .btn-success{background:var(--success);color:#fff}
  .btn-sm{padding:6px 11px;font-size:12px}

  .sum-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
  .sum-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .sum-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--navy)}
  .sum-card.gold:before{background:var(--gold)}
  .sum-card.success:before{background:var(--success)}
  .sum-card.warn:before{background:var(--warn)}
  .sum-card.danger:before{background:var(--danger)}
  .sum-card .lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
  .sum-card .val{font-size:20px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums}
  .sum-card .sub{font-size:11px;color:var(--muted);margin-top:2px}

  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px;overflow-x:auto}
  .tab-btn{padding:10px 18px;background:transparent;color:var(--muted);font-weight:600;font-size:14px;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
  .tab-btn:hover{color:var(--navy)}
  .tab-btn.active{color:var(--navy);border-bottom-color:var(--gold)}
  .tab-content{display:none}
  .tab-content.active{display:block}

  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .toolbar .search{flex:1;min-width:180px;position:relative}
  .toolbar .search input{width:100%;padding:10px 14px 10px 36px;background:var(--surface);border:1px solid var(--line);border-radius:10px;font-size:14px;outline:none}
  .toolbar .search:before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}
  .toolbar select{padding:10px 14px;background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:10px;font-size:13.5px}

  /* Table view */
  .chk-tbl-wrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:auto;box-shadow:var(--shadow)}
  .chk-tbl{width:100%;border-collapse:collapse;font-size:12.5px;min-width:900px}
  .chk-tbl th{background:var(--navy);color:#fff;padding:10px 8px;font-weight:600;text-align:left;font-size:11.5px;letter-spacing:.02em;white-space:nowrap}
  .chk-tbl td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  .chk-tbl tr:hover td{background:var(--surface-2);cursor:pointer}
  .chk-tbl .r{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  .chk-tbl .c{text-align:center}

  .status-badge{display:inline-flex;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
  .status-badge.pending{background:var(--warn-soft);color:var(--warn)}
  .status-badge.delivered{background:var(--info-soft);color:var(--info)}
  .status-badge.cleared{background:var(--success-soft);color:var(--success)}
  .status-badge.bounced{background:var(--danger-soft);color:var(--danger)}
  .status-badge.cancelled{background:#F5F2EB;color:#6B7280;text-decoration:line-through}

    if(!s || !s.expiresAt || Date.now() > s.expiresAt) return null;
    return s;
  } catch(e){ return null; }
}
const SESSION = getSession();

const $ = id => document.getElementById(id);
const esc = s => String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const fmtMoney = n => (+n||0).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtDate = d => {
  if(!d) return "-";
  const dt = new Date(d);
  const yy = String((dt.getFullYear()+543)).slice(2);
  const mm = String(dt.getMonth()+1).padStart(2,"0");
  const dd = String(dt.getDate()).padStart(2,"0");
  return `${dd}/${mm}/${yy}`;
};
const monthLabel = ym => {
  const [y,m] = ym.split("-");
  const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  return months[+m-1] + " " + (+y + 543);
};

function toast(msg, kind){
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show" + (kind ? " " + kind : "");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove("show"), 2600);
}
function openMask(id){ $(id).classList.add("show"); }
function closeMask(id){ $(id).classList.remove("show"); }
window.closeMask = closeMask;

const COMPANY = {
  logo: window.LOGO_JMP,
  name: "บริษัท เจเอ็ม. เพ้นท์ติ้งแอนด์ซัพพลาย จำกัด",
  nameEn: "JM. PAINTING AND SUPPLY CO., LTD.",
  slogan: "ครบจบเรื่องงานโรยตัว"
};

function waitFB(){
  return new Promise(res => {
    if(window.FB){ res(window.FB); return; }
    window.addEventListener("fb-ready", ()=>res(window.FB), {once:true});
    setTimeout(()=>{ if(!window.FB) res(null); }, 8000);
  });
}

const STATUS_LABEL = {
  pending: "รอขึ้นเงิน",
  delivered: "มอบแล้ว",
  cleared: "ขึ้นเงินแล้ว",
  bounced: "เช็คเด้ง",
  cancelled: "ยกเลิก"
};

let CHECKS = [];
let CURRENT_ID = null;
let CURRENT_TAB = "out";

async function loadAll(){
  const FB = await waitFB();
  if(!FB){ toast("เชื่อมต่อไม่ได้","err"); return; }
  const snap = await FB.getDocs(FB.collection(FB.db, "checks"));
  CHECKS = [];
  snap.forEach(d => CHECKS.push({id:d.id, ...d.data()}));
  CHECKS.sort((a,b) => new Date(b.checkDate||0) - new Date(a.checkDate||0));
  renderAll();
}

function switchTab(tab){
  CURRENT_TAB = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab===tab));
  renderList();
}
window.switchTab = switchTab;

function renderAll(){
  fillMonthFilter();
  fillPartyDatalists();
  renderSummary();
  renderList();
}

function fillMonthFilter(){
  const months = new Set();
  CHECKS.forEach(c => {
    if(c.checkDate){
      const ym = c.checkDate.slice(0,7);
      months.add(ym);
    }
  });
  const sorted = Array.from(months).sort().reverse();
  const sel = $("filterMonth");
  const cur = sel.value;
  sel.innerHTML = '<option value="all">ทุกเดือน</option>' + sorted.map(ym => `<option value="${ym}">${monthLabel(ym)}</option>`).join("");
  sel.value = cur || "all";
}

function fillPartyDatalists(){
  const parties = new Set();
  const projCodes = new Set();
  const projNames = new Set();
  CHECKS.forEach(c => {
    if(c.payee) parties.add(c.payee);
    if(c.projectCode) projCodes.add(c.projectCode);
    if(c.projectName) projNames.add(c.projectName);
  });
  $("partyList").innerHTML = Array.from(parties).map(p => `<option value="${esc(p)}">`).join("");
  $("projCodeList").innerHTML = Array.from(projCodes).map(p => `<option value="${esc(p)}">`).join("");
  $("projNameList").innerHTML = Array.from(projNames).map(p => `<option value="${esc(p)}">`).join("");
}

function renderSummary(){
  const filtered = CHECKS.filter(c => c.type === CURRENT_TAB);
  const total = filtered.length;
  const cleared = filtered.filter(c => c.status === "cleared").length;
  const pending = filtered.filter(c => c.status === "pending" || c.status === "delivered").length;
  const bounced = filtered.filter(c => c.status === "bounced" || c.status === "cancelled").length;
  const sumCleared = filtered.filter(c => c.status === "cleared").reduce((s,c)=>s + (+c.amount - +(c.wht||0)), 0);
  const sumPending = filtered.filter(c => c.status === "pending" || c.status === "delivered").reduce((s,c)=>s + (+c.amount - +(c.wht||0)), 0);
  const grandTotal = filtered.reduce((s,c)=>s + (+c.amount - +(c.wht||0)), 0);

  $("sumStrip").innerHTML = `
    <div class="sum-card"><div class="lbl">เช็คทั้งหมด</div><div class="val">${total} ฉบับ</div><div class="sub">฿${fmtMoney(grandTotal)}</div></div>
    <div class="sum-card success"><div class="lbl">ขึ้นเงินแล้ว</div><div class="val">${cleared} ฉบับ</div><div class="sub">฿${fmtMoney(sumCleared)}</div></div>
    <div class="sum-card warn"><div class="lbl">รอขึ้นเงิน</div><div class="val">${pending} ฉบับ</div><div class="sub">฿${fmtMoney(sumPending)}</div></div>
    <div class="sum-card danger"><div class="lbl">เด้ง / ยกเลิก</div><div class="val">${bounced} ฉบับ</div></div>
  `;
}

async function saveCheck(){
  const type = document.querySelector('input[name="cType"]:checked').value;
  const checkNo = $("cCheckNo").value.trim();
  const checkDate = $("cCheckDate").value;
  const bank = $("cBank").value.trim();
  const payee = $("cPayee").value.trim();
  const amount = +$("cAmount").value;
  if(!checkNo){ toast("กรอกเลขที่เช็ค","err"); return; }
  if(!checkDate){ toast("กรอกวันที่","err"); return; }
  if(!bank){ toast("เลือกธนาคาร","err"); return; }
  if(!payee){ toast("กรอกผู้รับ/ผู้จ่าย","err"); return; }
  if(!amount || amount <= 0){ toast("กรอกจำนวนเงิน","err"); return; }

  const btn = $("checkSaveBtn"); btn.disabled = true; btn.textContent = "กำลังบันทึก...";
  try {
    const FB = await waitFB();
    const id = CURRENT_ID || ("chk_"+uid());
    const data = {
      type, checkNo, checkDate, bank,
      branch: $("cBranch").value.trim(),
      acctNo: $("cAcctNo").value.trim(),
      payee, amount,
      wht: +$("cWht").value || 0,
      description: $("cDescription").value.trim(),
      projectCode: $("cProjectCode").value.trim(),
      projectName: $("cProjectName").value.trim(),
      pvNo: $("cPvNo").value.trim(),
      invoiceNo: $("cInvoiceNo").value.trim(),
      status: $("cStatus").value,
      clearedDate: $("cClearedDate").value,
      approvedBy: $("cApprovedBy").value.trim(),
      note: $("cNote").value.trim(),
      updatedBy: SESSION.name,
      updatedAt: FB.serverTimestamp()
    };
    if(!CURRENT_ID){ data.createdBy = SESSION.name; data.createdAt = FB.serverTimestamp(); }
    await FB.setDoc(FB.doc(FB.db, "checks", id), data, {merge:true});
    closeMask("checkModal");
    toast("บันทึกแล้ว ✓","ok");
    await loadAll();
  } catch(e){ toast(e.message,"err"); }
  finally { btn.disabled = false; btn.textContent = "💾 บันทึก"; }
}
window.saveCheck = saveCheck;

async function deleteCheck(){
  if(!CURRENT_ID) return;
  if(!confirm("ลบเช็คนี้?")) return;
  try {
    const FB = await waitFB();
    await FB.deleteDoc(FB.doc(FB.db, "checks", CURRENT_ID));
    closeMask("checkModal");
    toast("ลบแล้ว","ok");
    await loadAll();
  } catch(e){ toast(e.message,"err"); }
}
window.deleteCheck = deleteCheck;

async function exportPDFFromNode(nodeId, filename, orient){
  try {
    toast("กำลังสร้าง PDF...");
    const node = document.getElementById(nodeId);
    const canvas = await html2canvas(node, {scale:2, backgroundColor:"#fff", useCORS:true, logging:false});
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit:"mm", format:"a4", orientation:orient||"portrait"});
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const ratio = Math.min(pageW / canvas.width, pageH / canvas.height);
    const imgW = canvas.width * ratio;
    const imgH = canvas.height * ratio;
    const x = (pageW - imgW) / 2;
    pdf.addImage(canvas.toDataURL("image/jpeg", 0.92), "JPEG", x, 0, imgW, imgH);
    pdf.save(filename);
    toast("บันทึก PDF แล้ว ✓", "ok");
  } catch(e){ toast("ผิดพลาด: "+e.message, "err"); }
}
