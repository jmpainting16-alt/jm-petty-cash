<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ทีมงาน — บจก. เจเอ็ม. เพ้นท์ติ้งแอนด์ซัพพลาย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#1B2A5B">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans Thai', 'Noto Sans Thai', 'Sarabun', sans-serif; background: #F5F2EB; min-height: 100vh; color: #0F1836; }

.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: linear-gradient(180deg, #0F1836 0%, #1B2A5B 100%); color: #fff; padding: 28px 20px; display: flex; flex-direction: column; z-index: 10; }
.sidebar-logo { font-size: 13px; font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
.sidebar-sub { font-size: 12px; color: #6B7280; margin-bottom: 32px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; color: #8B8B7A; cursor: pointer; margin-bottom: 4px; border: none; background: none; width: 100%; text-align: left; font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif; transition: all 0.15s; }
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-item.active { color: #D4A574; background: linear-gradient(90deg, rgba(184,137,74,.28), rgba(184,137,74,.06)); border: 1px solid rgba(212,165,116,.35); }

.main { margin-left: 220px; padding: 32px 28px; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 22px; font-weight: 700; color: #1B2A5B; }
.page-sub { font-size: 13px; color: #6B7280; margin-top: 2px; }

.tabs { display: flex; gap: 4px; background: #fff; border-radius: 12px; padding: 4px; border: 1px solid #E5DFCE; margin-bottom: 24px; width: fit-content; }
.tab-btn { padding: 8px 20px; border-radius: 8px; font-size: 14px; font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif; font-weight: 500; cursor: pointer; border: none; background: none; color: #6B7280; transition: all 0.15s; }
.tab-btn.active { background: linear-gradient(180deg, #0F1836 0%, #1B2A5B 100%); color: #fff; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.btn { padding: 9px 18px; border-radius: 10px; font-size: 14px; font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif; font-weight: 500; cursor: pointer; border: 1.5px solid #E5DFCE; background: #fff; color: #0F1836; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
.btn:hover { opacity: 0.75; }
.btn-dark { background: linear-gradient(180deg, #0F1836 0%, #1B2A5B 100%); color: #fff; border-color: #0F1836; }
.btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; }
.btn-danger { color: #dc2626; border-color: #fca5a5; }

.member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.member-card { background: #fff; border-radius: 14px; border: 1.5px solid #f0f0f0; padding: 18px; }
.member-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(180deg, #0F1836 0%, #1B2A5B 100%); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.member-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.member-pos { font-size: 13px; color: #6B7280; margin-bottom: 8px; }
.member-tel { font-size: 13px; color: #555; margin-bottom: 14px; }
.member-actions { display: flex; gap: 8px; }
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
.pill-on { background: #f0fdf4; color: #166534; }
.pill-off { background: #FAF7F0; color: #6B7280; }

.add-card { background: #fff; border-radius: 14px; border: 2px dashed #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; cursor: pointer; color: #bbb; min-height: 180px; transition: all 0.15s; }
.add-card:hover { border-color: #0F1836; color: #0F1836; }

.report-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.month-select { padding: 9px 14px; border: 1.5px solid #E5DFCE; border-radius: 10px; font-size: 14px; font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif; background: #fff; }

.summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.sum-card { background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #E5DFCE; text-align: center; }
.sum-num { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.sum-label { font-size: 12px; color: #6B7280; }

.report-card { background: #fff; border-radius: 16px; border: 1px solid #E5DFCE; overflow: hidden; }
.report-header { padding: 16px 20px; border-bottom: 1px solid #E5DFCE; display: flex; align-items: center; justify-content: space-between; }
.report-title { font-size: 15px; font-weight: 600; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; font-weight: 700; color: #8B8B7A; letter-spacing: 0.06em; text-transform: uppercase; padding: 12px 16px; border-bottom: 1px solid #E5DFCE; background: #FAF7F0; }
td { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid #EDE7D8; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAF7F0; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 20px; width: 100%; max-width: 440px; padding: 28px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: #555; font-weight: 500; margin-bottom: 6px; }
.field input, .field select { width: 100%; padding: 10px 12px; border: 1.5px solid #E5DFCE; border-radius: 10px; font-size: 15px; font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif; color: #0F1836; background: #FAF7F0; outline: none; }
.field input:focus, .field select:focus { border-color: #0F1836; background: #fff; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

.confirm-box { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 320px; text-align: center; }
.confirm-box h3 { font-size: 17px; margin: 12px 0 8px; }
.confirm-box p { font-size: 14px; color: #6B7280; margin-bottom: 20px; }

.empty-msg { text-align: center; padding: 50px 20px; color: #bbb; font-size: 14px; }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: linear-gradient(180deg, #0F1836 0%, #1B2A5B 100%); color: #fff; padding: 12px 22px; border-radius: 100px; font-size: 13px; font-weight: 500; transition: transform 0.3s; z-index: 300; white-space: nowrap; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }

.banner { display: none; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; border: 1px solid; font-size: 13px; margin-bottom: 20px; }

@media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 20px 16px; } .summary-bar { grid-template-columns: repeat(2,1fr); } }
</style>

</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">บจก. เจเอ็ม. เพ้นท์ติ้งแอนด์ซัพพลาย</div>
  <div class="sidebar-sub">ระบบเช็คอินช่าง</div>
  <button class="nav-item" onclick="location.href='dashboard.html'">📊 Dashboard</button>
  <button class="nav-item active">👥 ทีมงาน</button>
  <button class="nav-item" onclick="location.href='report.html'">📋 รายงานรายบุคคล</button>
  <button class="nav-item" onclick="location.href='sites.html'">⚙️ ตั้งค่าไซต์งาน</button>
</nav>

<main class="main">
  <div id="banner" class="banner"></div>

  <div class="topbar">
    <div><div class="page-title">ทีมงาน</div><div class="page-sub">จัดการรายชื่อและดูรายงานรายเดือน</div></div>
    <button class="btn btn-dark" onclick="openAdd()">+ เพิ่มสมาชิก</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tb-members" onclick="switchTab('members')">👥 รายชื่อทีมงาน</button>
    <button class="tab-btn" id="tb-report" onclick="switchTab('report')">📅 รายงานรายเดือน</button>
  </div>

  <div class="tab-content active" id="tab-members">
    <div class="member-grid" id="member-grid"><div class="empty-msg">กำลังโหลด...</div></div>
  </div>

  <div class="tab-content" id="tab-report">
    <div class="report-controls">
      <select class="month-select" id="report-month" onchange="loadReport()"></select>
      <select class="month-select" id="report-site" onchange="loadReport()"><option value="all">ทุกไซต์</option></select>
      <button class="btn" onclick="exportReport()">📥 Export CSV</button>
    </div>
    <div class="summary-bar">
      <div class="sum-card"><div class="sum-num" id="s-present" style="color:#0F1836;">—</div><div class="sum-label">วันทำงาน (รวม)</div></div>
      <div class="sum-card"><div class="sum-num" id="s-late" style="color:#d97706;">—</div><div class="sum-label">⚠️ มาสาย (รวม)</div></div>
      <div class="sum-card"><div class="sum-num" id="s-absent" style="color:#dc2626;">—</div><div class="sum-label">❌ ขาดงาน (รวม)</div></div>
      <div class="sum-card"><div class="sum-num" id="s-perfect" style="color:#16a34a;">—</div><div class="sum-label">✅ ตรงเวลาทุกวัน</div></div>
    </div>
    <div class="report-card">
      <div class="report-header">
        <div class="report-title" id="report-title">สรุปรายเดือน</div>
        <div style="font-size:12px;color:#aaa;">นับจากข้อมูลเช็คอินจริง</div>
      </div>
      <div id="report-wrap"><div class="empty-msg">เลือกเดือนเพื่อดูรายงาน</div></div>
    </div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="member-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">เพิ่มสมาชิก</div>
    <div class="field"><label>ชื่อ-นามสกุล *</label><input id="m-name" type="text" placeholder="เช่น สมชาย ใจดี" /></div>
    <div class="field"><label>ตำแหน่ง</label>
      <select id="m-pos">
        <option value="">-- เลือกตำแหน่ง --</option>
        <option value="เจ้าของ">เจ้าของ</option>
        <option value="เลขานุการผู้บริหาร">เลขานุการผู้บริหาร</option>
        <option value="วิศวกร">วิศวกร</option>
        <option value="โฟร์แมน">โฟร์แมน</option>
      </select>
    </div>
    <div class="field"><label>เบอร์โทร</label><input id="m-tel" type="tel" placeholder="08x-xxx-xxxx" /></div>
    <div class="field"><label>วันเริ่มงาน</label><input id="m-start" type="date" /></div>
    <div class="field">
      <label>สถานะ</label>
      <select id="m-status">
        <option value="active">ทำงานอยู่</option>
        <option value="inactive">ลาออก / ไม่ใช้งาน</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-dark" onclick="saveMember()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="modal-bg" id="del-modal">
  <div class="confirm-box">
    <div style="font-size:36px;">🗑️</div>
    <h3>ลบสมาชิกนี้?</h3>
    <p id="del-msg">ไม่สามารถกู้คืนได้</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn" onclick="closeDel()">ยกเลิก</button>
      <button class="btn btn-danger" onclick="doDelete()">ลบ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Role guard: เฉพาะ owner/manager เข้าถึงได้ =====
(function guardRole(){
  try {
    var raw = localStorage.getItem("jm_portal_session_v1");
    if(!raw){ window.location.href = "index.html"; return; }
    var sess = JSON.parse(raw);
    if(!sess || !sess.expiresAt || Date.now() > sess.expiresAt){
      localStorage.removeItem("jm_portal_session_v1");
      window.location.href = "index.html"; return;
    }
    var role = sess.role || "worker";
    if(role !== "owner" && role !== "manager"){
      alert("หน้านี้สำหรับเจ้าของและผู้จัดการเท่านั้น\nกำลังพาไปหน้าเช็คอิน...");
      window.location.href = "checkin.html"; return;
    }
  } catch(e){ window.location.href = "index.html"; return; }
})();
</script>
<script>
// ── CONFIG ──────────────────────────────
var FIREBASE_CFG = {
  apiKey: "AIzaSyDWyYUy2bMQr339i1rJw1CvvTZb2L9L1VI",
  authDomain: "jm-checkin.firebaseapp.com",
  databaseURL: "https://jm-checkin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "jm-checkin",
  storageBucket: "jm-checkin.firebasestorage.app",
};
// ────────────────────────────────────────

var members  = {};
var checkins = [];
var editKey  = null;
var delKey   = null;
var fbDb     = null;
var fbFns    = null;

// ── Boot ─────────────────────────────────
buildMonths();
initFirebase();

function initFirebase() {
  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js")
    .then(function(appMod) {
      return import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js")
        .then(function(dbMod) {
          var app = appMod.initializeApp(FIREBASE_CFG);
          fbDb  = dbMod.getDatabase(app);
          fbFns = dbMod;

          // Listen members
          dbMod.onValue(dbMod.ref(fbDb, "members"), function(snap) {
            members = {};
            snap.forEach(function(c) { members[c.key] = c.val(); });
            renderMembers();
            renderSiteFilter();
          });

          // Listen checkins
          dbMod.onValue(dbMod.ref(fbDb, "checkins"), function(snap) {
            checkins = [];
            snap.forEach(function(c) { checkins.push(Object.assign({ id: c.key }, c.val())); });
          });

          // Listen sites for filter
          dbMod.onValue(dbMod.ref(fbDb, "sites"), function(snap) {
            var sel = document.getElementById("report-site");
            var cur = sel.value;
            sel.innerHTML = '<option value="all">ทุกไซต์</option>';
            snap.forEach(function(c) {
              var opt = document.createElement("option");
              opt.value = c.val().name; opt.textContent = c.val().name;
              if (c.val().name === cur) opt.selected = true;
              sel.appendChild(opt);
            });
          });

          setBanner("firebase");
        });
    })
    .catch(function(e) { console.warn("Firebase:", e); setBanner("local"); renderMembers(); });
}

function setBanner(mode) {
  var el = document.getElementById("banner");
  if (mode === "firebase") {
    el.style.cssText = "display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;border:1px solid #86efac;background:#f0fdf4;color:#166534;font-size:13px;margin-bottom:20px;";
    el.textContent = "🟢 เชื่อมต่อ Firebase — ซิงค์ real-time";
  } else {
    el.style.cssText = "display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;border:1px solid #fca5a5;background:#fef2f2;color:#991b1b;font-size:13px;margin-bottom:20px;";
    el.textContent = "🔴 ไม่สามารถเชื่อมต่อ Firebase ได้ — ตรวจสอบ Config";
  }
}

function renderSiteFilter() {}

// ── Render members ────────────────────────
function renderMembers() {
  var grid = document.getElementById("member-grid");
  var keys = Object.keys(members);
  if (!keys.length) {
    grid.innerHTML = '<div class="empty-msg">ยังไม่มีสมาชิก — กดปุ่ม "เพิ่มสมาชิก"</div>' +
      '<div class="add-card" onclick="openAdd()"><div style="font-size:32px;margin-bottom:8px;">＋</div><div style="font-size:14px;font-weight:500;">เพิ่มสมาชิก</div></div>';
    return;
  }
  var html = keys.map(function(k) {
    var m  = members[k];
    var on = m.status !== "inactive";
    var initials = (m.name || "?").split(" ").slice(0,2).map(function(w) { return w[0] || ""; }).join("").toUpperCase();
    return '<div class="member-card">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">' +
        '<div class="member-avatar">' + initials + '</div>' +
        '<span class="pill ' + (on ? 'pill-on' : 'pill-off') + '">' + (on ? 'ทำงานอยู่' : 'ไม่ใช้งาน') + '</span>' +
      '</div>' +
      '<div class="member-name">' + esc(m.name) + '</div>' +
      '<div class="member-pos">' + esc(m.position || '—') + '</div>' +
      '<div class="member-tel">📞 ' + esc(m.tel || '—') + '</div>' +
      '<div class="member-actions">' +
        '<button class="btn btn-sm" style="flex:1;" onclick="openEdit(\'' + k + '\')">✏️ แก้ไข</button>' +
        '<button class="btn btn-sm btn-danger" onclick="askDel(\'' + k + '\',\'' + esc(m.name) + '\')">🗑️</button>' +
      '</div>' +
    '</div>';
  }).join("");
  grid.innerHTML = html + '<div class="add-card" onclick="openAdd()"><div style="font-size:32px;margin-bottom:8px;">＋</div><div style="font-size:14px;font-weight:500;">เพิ่มสมาชิก</div></div>';
}

function esc(s) {
  return String(s || '').replace(/['"<>&]/g, function(c) {
    return { "'": "&#39;", '"': "&quot;", '<': "&lt;", '>': "&gt;", '&': "&amp;" }[c];
  });
}

// ── Modal ─────────────────────────────────
function openAdd() {
  editKey = null;
  document.getElementById("modal-title").textContent = "เพิ่มสมาชิก";
  document.getElementById("m-name").value  = "";
  document.getElementById("m-pos").value   = "";
  document.getElementById("m-tel").value   = "";
  document.getElementById("m-start").value = "";
  document.getElementById("m-status").value = "active";
  document.getElementById("member-modal").classList.add("open");
  setTimeout(function() { document.getElementById("m-name").focus(); }, 100);
}

function openEdit(k) {
  editKey = k;
  var m = members[k];
  if (!m) { toast("❌ ไม่พบข้อมูล"); return; }
  document.getElementById("modal-title").textContent = "แก้ไข " + m.name;
  document.getElementById("m-name").value   = m.name     || "";
  document.getElementById("m-pos").value    = m.position || "";
  document.getElementById("m-tel").value    = m.tel      || "";
  document.getElementById("m-start").value  = m.startDate || "";
  document.getElementById("m-status").value = m.status   || "active";
  document.getElementById("member-modal").classList.add("open");
}

function closeModal() { document.getElementById("member-modal").classList.remove("open"); }

// ── Save ──────────────────────────────────
function saveMember() {
  var name = document.getElementById("m-name").value.trim();
  if (!name) { toast("⚠️ กรุณากรอกชื่อ-นามสกุล"); return; }

  var data = {
    name:      name,
    position:  document.getElementById("m-pos").value.trim(),
    tel:       document.getElementById("m-tel").value.trim(),
    startDate: document.getElementById("m-start").value,
    status:    document.getElementById("m-status").value,
    updatedAt: Date.now(),
  };

  if (!fbDb || !fbFns) { toast("❌ ยังไม่ได้เชื่อมต่อ Firebase"); return; }

  var promise = editKey
    ? fbFns.update(fbFns.ref(fbDb, "members/" + editKey), data)
    : fbFns.push(fbFns.ref(fbDb, "members"), Object.assign({ createdAt: Date.now() }, data));

  promise
    .then(function() {
      toast(editKey ? "✓ บันทึกแล้ว" : "✓ เพิ่มสมาชิกแล้ว");
      closeModal();
    })
    .catch(function(e) { toast("❌ " + e.message); });
}

// ── Delete ────────────────────────────────
function askDel(k, name) {
  delKey = k;
  document.getElementById("del-msg").textContent = 'ลบ "' + name + '" — ไม่สามารถกู้คืนได้';
  document.getElementById("del-modal").classList.add("open");
}
function closeDel() { document.getElementById("del-modal").classList.remove("open"); delKey = null; }
function doDelete() {
  if (!delKey || !fbDb || !fbFns) return;
  fbFns.remove(fbFns.ref(fbDb, "members/" + delKey))
    .then(function() { toast("🗑️ ลบแล้ว"); closeDel(); })
    .catch(function(e) { toast("❌ " + e.message); });
}

// ── Tabs ──────────────────────────────────
function switchTab(tab) {
  document.getElementById("tb-members").classList.toggle("active", tab === "members");
  document.getElementById("tb-report").classList.toggle("active",  tab === "report");
  document.getElementById("tab-members").classList.toggle("active", tab === "members");
  document.getElementById("tab-report").classList.toggle("active",  tab === "report");
  if (tab === "report") loadReport();
}

// ── Month builder ─────────────────────────
function buildMonths() {
  var sel = document.getElementById("report-month");
  var now = new Date();
  for (var i = 0; i < 12; i++) {
    var d   = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var val = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
    var lbl = d.toLocaleDateString("th-TH", { month: "long", year: "numeric" });
    var opt = document.createElement("option");
    opt.value = val; opt.textContent = lbl;
    sel.appendChild(opt);
  }
}

// ── Report ────────────────────────────────
function loadReport() {
  var parts     = document.getElementById("report-month").value.split("-");
  var year      = parseInt(parts[0]);
  var month     = parseInt(parts[1]);
  var siteFilter = document.getElementById("report-site").value;
  var workStart = localStorage.getItem("jm_work_start") || "09:00";
  var wParts    = workStart.split(":");
  var wh = parseInt(wParts[0]), wm = parseInt(wParts[1]);

  // วันทำงาน (จันทร์-เสาร์)
  var daysInMonth = new Date(year, month, 0).getDate();
  var workDayCount = 0;
  for (var d = 1; d <= daysInMonth; d++) {
    if (new Date(year, month-1, d).getDay() !== 0) workDayCount++;
  }

  // Filter checkins
  var monthCheckins = checkins.filter(function(r) {
    if (!r.checkinTs) return false;
    var cd = new Date(r.checkinTs);
    return cd.getFullYear() === year && cd.getMonth()+1 === month &&
      (siteFilter === "all" || r.site === siteFilter);
  });

  // สรุปแต่ละคน
  var memberKeys = Object.keys(members).filter(function(k) { return members[k].status !== "inactive"; });
  var rows = memberKeys.map(function(k) {
    var m      = members[k];
    var myRec  = monthCheckins.filter(function(r) { return r.name === m.name; });
    var days   = new Set(myRec.map(function(r) { return new Date(r.checkinTs).toDateString(); }));
    var present = days.size;
    var absent  = Math.max(0, workDayCount - present);
    var lateDays = 0, totalLateMin = 0;
    myRec.forEach(function(r) {
      if (!r.checkinTime) return;
      var tp   = r.checkinTime.split(":");
      var diff = (parseInt(tp[0])*60 + parseInt(tp[1])) - (wh*60 + wm);
      if (diff > 0) { lateDays++; totalLateMin += diff; }
    });
    var avgLate = lateDays > 0 ? Math.round(totalLateMin/lateDays) : 0;
    return { m: m, present: present, absent: absent, lateDays: lateDays, avgLate: avgLate };
  });

  // Summary
  var totalPresent = rows.reduce(function(s,r){return s+r.present;},0);
  var totalLate    = rows.reduce(function(s,r){return s+r.lateDays;},0);
  var totalAbsent  = rows.reduce(function(s,r){return s+r.absent;},0);
  var perfect      = rows.filter(function(r){return r.lateDays===0&&r.absent===0;}).length;
  document.getElementById("s-present").textContent = totalPresent;
  document.getElementById("s-late").textContent    = totalLate;
  document.getElementById("s-absent").textContent  = totalAbsent;
  document.getElementById("s-perfect").textContent = perfect;

  var thMonth = new Date(year, month-1, 1).toLocaleDateString("th-TH", { month: "long", year: "numeric" });
  document.getElementById("report-title").textContent = "สรุปประจำเดือน " + thMonth + " (วันทำงาน " + workDayCount + " วัน)";

  if (!rows.length) {
    document.getElementById("report-wrap").innerHTML = '<div class="empty-msg">ยังไม่มีสมาชิก</div>';
    return;
  }

  var tableRows = rows.map(function(r) {
    var absentCls = r.absent  > 3 ? "color:#dc2626;font-weight:700;" : r.absent  > 0 ? "color:#d97706;font-weight:700;" : "color:#d1d5db;";
    var lateCls   = r.lateDays > 5 ? "color:#dc2626;font-weight:700;" : r.lateDays > 0 ? "color:#d97706;font-weight:700;" : "color:#d1d5db;";
    var status    = r.absent===0 && r.lateDays===0
      ? '<span style="color:#16a34a;font-weight:600;">✅ ดีมาก</span>'
      : r.absent > 3 || r.lateDays > 5
        ? '<span style="color:#dc2626;font-weight:600;">⚠️ ต้องดูแล</span>'
        : '<span style="color:#d97706;font-weight:600;">🔔 ระวัง</span>';
    var lateLabel  = r.lateDays > 0 ? r.lateDays + ' วัน<br><span style="font-size:11px;color:#aaa;">เฉลี่ย ' + r.avgLate + ' นาที</span>' : '—';
    var absentLabel = r.absent > 0 ? r.absent + ' วัน' : '—';
    return '<tr>' +
      '<td><strong>' + esc(r.m.name) + '</strong><br><span style="font-size:12px;color:#aaa;">' + esc(r.m.position||'—') + '</span></td>' +
      '<td style="text-align:center;font-size:18px;font-weight:700;">' + r.present + '</td>' +
      '<td style="text-align:center;font-size:16px;' + absentCls + '">' + absentLabel + '</td>' +
      '<td style="text-align:center;font-size:16px;' + lateCls + '">' + lateLabel + '</td>' +
      '<td style="text-align:center;">' + status + '</td>' +
    '</tr>';
  }).join("");

  document.getElementById("report-wrap").innerHTML =
    '<table><thead><tr>' +
    '<th>ชื่อ</th>' +
    '<th style="text-align:center;">มา (วัน)</th>' +
    '<th style="text-align:center;">❌ ขาด</th>' +
    '<th style="text-align:center;">⚠️ สาย</th>' +
    '<th style="text-align:center;">ภาพรวม</th>' +
    '</tr></thead><tbody>' + tableRows + '</tbody></table>';

  window._reportRows  = rows;
  window._reportMonth = thMonth;
}

function exportReport() {
  if (!window._reportRows) { toast("กรุณาโหลดรายงานก่อน"); return; }
  var header = "ชื่อ,ตำแหน่ง,มาทำงาน(วัน),ขาด(วัน),สาย(วัน),สายเฉลี่ย(นาที)\n";
  var rows = window._reportRows.map(function(r) {
    return r.m.name + "," + (r.m.position||"") + "," + r.present + "," + r.absent + "," + r.lateDays + "," + r.avgLate;
  }).join("\n");
  var blob = new Blob(["\uFEFF"+header+rows], {type:"text/csv;charset=utf-8"});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href = url; a.download = "รายงาน_" + (window._reportMonth||"เดือน") + ".csv"; a.click();
}

// ── Toast ─────────────────────────────────
function toast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(el._t); el._t = setTimeout(function() { el.classList.remove("show"); }, 3000);
}

// ── Close on bg click ─────────────────────
document.getElementById("member-modal").addEventListener("click", function(e) { if (e.target.id === "member-modal") closeModal(); });
document.getElementById("del-modal").addEventListener("click",    function(e) { if (e.target.id === "del-modal")    closeDel(); });

// Expose
window.openAdd    = openAdd;
window.openEdit   = openEdit;
window.closeModal = closeModal;
window.saveMember = saveMember;
window.askDel     = askDel;
window.closeDel   = closeDel;
window.doDelete   = doDelete;
window.switchTab  = switchTab;
window.loadReport = loadReport;
window.exportReport = exportReport;
</script>
