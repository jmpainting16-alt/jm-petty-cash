<style>
  :root{
    --bg:#EEF2F0;
    --surface:#FFFFFF;
    --surface-2:#F6F8F7;
    --ink:#142019;
    --muted:#647067;
    --line:#E0E6E2;
    --brand:#0E5C46;
    --brand-2:#13745A;
    --brand-soft:#E4F2EC;
    --expense:#B4421F;
    --expense-soft:#FBEAE3;
    --income:#15803D;
    --warn:#B45309;
    --warn-soft:#FDF1DE;
    --pending:#B45309;
    --radius:16px;
    --shadow:0 1px 2px rgba(20,32,25,.06),0 6px 18px rgba(20,32,25,.06);
    --font:'IBM Plex Sans Thai','Noto Sans Thai','Sarabun',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box}
  #root{font-family:var(--font);color:var(--ink);background:var(--bg);min-height:100vh;-webkit-text-size-adjust:100%}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px 120px}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:30;background:var(--bg);padding:14px 0 10px}
  .topbar-inner{max-width:920px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px}
  .brandmark{display:flex;align-items:center;gap:10px}
  .logo-box{width:40px;height:40px;border-radius:11px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;letter-spacing:.5px;overflow:hidden;flex:0 0 auto}
  .logo-box img{width:100%;height:100%;object-fit:contain;background:#fff}
  .brand-title{font-weight:700;font-size:16px;line-height:1.1}
  .brand-sub{font-size:12px;color:var(--muted)}

  /* cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:18px}
  .stack>*+*{margin-top:14px}

  /* hero balance */
  .hero{background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;border-radius:20px;padding:22px;position:relative;overflow:hidden}
  .hero:after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
  .hero-label{font-size:13px;opacity:.85;letter-spacing:.3px}
  .hero-amount{font-size:40px;font-weight:700;line-height:1.05;margin-top:4px;font-variant-numeric:tabular-nums}
  .hero-amount .cur{font-size:18px;font-weight:500;opacity:.8;margin-left:4px}
  .hero-row{display:flex;gap:22px;margin-top:18px;flex-wrap:wrap}
  .hero-stat .k{font-size:11px;opacity:.8}
  .hero-stat .v{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
  .hero-bar{height:7px;border-radius:6px;background:rgba(255,255,255,.22);margin-top:16px;overflow:hidden}
  .hero-bar>i{display:block;height:100%;background:#fff;border-radius:6px}

  .warnbox{background:var(--warn-soft);border:1px solid #F2D9A8;color:var(--warn);border-radius:12px;padding:10px 14px;font-size:13.5px;display:flex;gap:8px;align-items:center}

  /* sections */
  .sec-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:none;letter-spacing:.2px;margin:0 0 10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}

  /* buttons */
  .btn{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-family:inherit;font-size:15px;font-weight:600;padding:12px 16px;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s;width:100%}
  .btn:hover{border-color:#cdd6d0}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .btn.danger{color:var(--expense);border-color:var(--expense-soft)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--brand);padding:8px 10px;width:auto}
  .btn.sm{padding:8px 12px;font-size:13.5px;width:auto}
  .btn[disabled]{opacity:.5;cursor:not-allowed}

  /* forms */
  label.fl{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 6px}
  .field+ .field{margin-top:14px}
  input,select,textarea{width:100%;font-family:inherit;font-size:15.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px var(--brand-soft)}
  textarea{resize:vertical;min-height:70px}
  .amt-input{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}

  /* photo capture */
  .photo-slot{border:1.5px dashed #C6D2CB;border-radius:14px;background:var(--surface-2);min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);cursor:pointer;text-align:center;padding:16px;position:relative;overflow:hidden}
  .photo-slot:hover{border-color:var(--brand);color:var(--brand)}
  .photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .photo-slot .rm{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer;z-index:2}
  .photo-ic{font-size:26px}

  /* list rows */
  .row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .thumb{width:46px;height:46px;border-radius:10px;background:var(--surface-2);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;overflow:hidden;cursor:pointer;border:1px solid var(--line)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .row-main{flex:1;min-width:0}
  .row-title{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row-meta{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .row-amt{font-weight:700;font-variant-numeric:tabular-nums;font-size:15px;text-align:right;white-space:nowrap}
  .neg{color:var(--expense)} .pos{color:var(--income)}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--surface-2);color:var(--muted)}
  .pill.cat{background:var(--brand-soft);color:var(--brand)}
  .pill.pend{background:var(--warn-soft);color:var(--pending)}
  .pill.appr{background:var(--brand-soft);color:var(--brand)}
  .pill.rej{background:var(--expense-soft);color:var(--expense)}

  .empty{text-align:center;color:var(--muted);padding:34px 10px;font-size:14px}
  .pill.ok{background:#E3F3E8;color:var(--income)}
  .lock-on{font-size:11.5px;font-weight:700;color:var(--brand);background:var(--brand-soft);padding:5px 10px;border-radius:20px;white-space:nowrap}
  .lock-off{font-size:11.5px;font-weight:700;color:var(--expense);background:#FBE9E3;padding:5px 10px;border-radius:20px;white-space:nowrap}
  .cloud-on{font-size:11.5px;font-weight:700;color:#0B6BB8;background:#E4F0FA;padding:5px 10px;border-radius:20px;white-space:nowrap}
  .cloud-off{font-size:11.5px;font-weight:700;color:#8a6d00;background:#FBF3D6;padding:5px 10px;border-radius:20px;white-space:nowrap}
  .ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat-card .k{font-size:12px;color:var(--muted)}
  .stat-card .v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
  .stat-card .s{font-size:11.5px;color:var(--muted);margin-top:2px}
  .bar-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
  .bar-l{flex:0 0 34%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;height:9px;background:var(--surface-2);border-radius:6px;overflow:hidden}
  .bar-track>i{display:block;height:100%;background:var(--brand);border-radius:6px}
  .bar-v{flex:0 0 auto;font-variant-numeric:tabular-nums;font-weight:600;font-size:13px}
  table.mini{width:100%;border-collapse:collapse;font-size:12.5px}
  table.mini th,table.mini td{border-bottom:1px solid var(--line);padding:7px 8px;text-align:left;white-space:nowrap}
  table.mini th{color:var(--muted);font-weight:600}
  table.mini td.num,table.mini th.num{text-align:right;font-variant-numeric:tabular-nums}

  /* tabs / bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;padding:6px max(env(safe-area-inset-bottom),6px)}
  .nav-inner{max-width:920px;margin:0 auto;width:100%;display:flex}
  .nav button{flex:1;background:none;border:none;font-family:inherit;color:var(--muted);font-size:11px;font-weight:600;padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:10px}
  .nav button .ic{font-size:19px;line-height:1}
  .nav button.active{color:var(--brand)}

  .page{display:none}
  .page.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* modal */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(10,18,14,.55);display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:92vh;overflow:auto;padding:20px;animation:up .22s ease}
  @media(min-width:560px){.overlay{align-items:center}.sheet{border-radius:20px}}
  @keyframes up{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
  .sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sheet-h h3{margin:0;font-size:17px}
  .xbtn{border:none;background:var(--surface-2);width:34px;height:34px;border-radius:50%;font-size:17px;cursor:pointer;color:var(--muted)}

  .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:30px;font-size:14px;z-index:80;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow)}
  .toast.show{opacity:1}

  .receipt-view img{width:100%;border-radius:12px;display:block}

  /* print area */
  #printArea{display:none}
  @media print{
    #root *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;inset:0;background:#fff}
    .nav,.topbar,.overlay{display:none!important}
  }
  /* printable doc styling (also used in on-screen preview) */
  .doc{font-family:var(--font);color:#111;background:#fff;width:100%;max-width:760px;margin:0 auto;padding:34px 38px}
  .doc-head{display:flex;align-items:flex-start;gap:16px;border-bottom:2px solid #111;padding-bottom:14px}
  .doc-logo{width:64px;height:64px;border-radius:12px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:26px;overflow:hidden;flex:0 0 auto}
  .doc-logo img{width:100%;height:100%;object-fit:contain;background:#fff}
  .doc-org{flex:1}
  .doc-org .nm{font-size:20px;font-weight:700}
  .doc-org .ad{font-size:12.5px;color:#555;margin-top:2px}
  .doc-title{text-align:right}
  .doc-title .t{font-size:19px;font-weight:700}
  .doc-title .no{font-size:13px;color:#444;margin-top:4px}
  .doc-meta{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin:18px 0;font-size:14px}
  .doc table{width:100%;border-collapse:collapse;font-size:13.5px}
  .doc th,.doc td{border:1px solid #999;padding:8px 10px;text-align:left;vertical-align:top}
  .doc th{background:#f0f3f1;font-weight:700}
  .doc td.num,.doc th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .doc .totrow td{font-weight:700;background:#f7f9f8}
  .doc .baht-txt{margin-top:8px;font-size:14px;font-style:italic;color:#333}
  .doc .signs{display:flex;justify-content:space-between;gap:30px;margin-top:48px;flex-wrap:wrap}
  .doc .sign{flex:1;min-width:150px;text-align:center;font-size:13px;color:#333}
  .doc .sign .ln{border-top:1px dotted #555;margin:0 0 6px;padding-top:34px}
  .doc .rcpt{margin-top:22px}
  .doc .rcpt img{max-width:320px;max-height:380px;border:1px solid #999;border-radius:6px}
  .print-actions{max-width:760px;margin:14px auto 30px;display:flex;gap:10px;justify-content:flex-end}
  @media print{.print-actions{display:none}}
  /* JM payment voucher (ใบสำคัญเบิกจ่าย) */
  .pv{font-family:var(--font);color:#111;background:#fff;max-width:760px;margin:0 auto;padding:30px 38px}
  .pv-top{display:flex;align-items:flex-start;gap:14px}
  .pv-logo{flex:0 0 auto;text-align:center;line-height:1;min-width:120px}
  .pv-logo img{max-width:130px;max-height:74px;object-fit:contain}
  .pv-jm{font-weight:800;font-size:42px;letter-spacing:1px;color:#1b2533;font-family:Georgia,'Times New Roman',serif}
  .pv-tag{font-size:10px;letter-spacing:3px;color:#E8852B;margin-top:1px}
  .pv-title{flex:1;text-align:center;font-size:27px;font-weight:700;padding-top:10px}
  .pv-no{flex:0 0 auto;font-size:13px;min-width:160px;padding-top:6px}
  .pv-no>div{margin-bottom:8px}
  .pv-no .ln{display:inline-block;border-bottom:1px dotted #555;min-width:90px;text-align:center}
  .pv-bar{height:10px;background:linear-gradient(90deg,#F6A623,#F7B733 60%,#F8C76b);border-radius:3px;margin:10px 0 16px}
  .pv-recip{font-size:14px;line-height:2.2}
  .pv-fill{border-bottom:1px dotted #555;display:inline-block;min-width:80px;padding:0 6px;text-align:left}
  .pv table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
  .pv th,.pv td{border:1px solid #333;padding:9px 10px}
  .pv .desc{text-align:left}
  .pv .baht,.pv .sat{text-align:right;font-variant-numeric:tabular-nums}
  .pv .baht{width:90px} .pv .sat{width:60px}
  .pv .amt-h{text-align:center}
  .pv th{background:#f3f5f4;font-weight:700;text-align:center}
  .pv th.desc{vertical-align:middle}
  .pv tr.blank td{height:30px}
  .pv .totrow td{font-weight:700;background:#f8faf9}
  .pv-bahttxt{font-size:13px;margin-top:8px;font-style:italic;color:#333}
  .pv-photos{display:flex;gap:18px;margin-top:18px}
  .pv-photo{flex:1;text-align:center}
  .pv-photo .cap{display:inline-block;border:1px solid #333;border-radius:16px;padding:5px 16px;font-size:13px;margin-bottom:8px}
  .pv-photo .frame{border:1px solid #999;border-radius:6px;height:210px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fbfbfb}
  .pv-photo .frame img{width:100%;height:100%;object-fit:contain}

  .pv-sign .d{font-size:12px;color:#444}
  @media print{ .pv{padding:14px 18px} .pv-photo .frame{height:185px} }

<script>
(function(){
  "use strict";

  /* ---------- portal role → camera-only mode ---------- */
  // ถ้าผู้ใช้เป็น "เจ้าของ" หรือ "CEO" → บังคับใช้กล้องเท่านั้น (ถ่ายรูปสด)
  // คนอื่น → เลือกได้ทั้งกล้อง + เลือกจากคลังภาพ
  try {
    var raw = localStorage.getItem("jm_portal_session_v1");
    if(raw){
      var s = JSON.parse(raw);
      if(s && (!s.expiresAt || Date.now() < s.expiresAt)){
        var pos = (s.position || "").toLowerCase();
        var role = (s.role || "").toLowerCase();
        var name = (s.name || "").toLowerCase();
        if(pos.indexOf("เจ้าของ") >= 0 || pos.indexOf("ceo") >= 0 ||
           role === "owner" || role === "ceo" ||
           name.indexOf("ceo") >= 0){
          window.PHOTO_CAMERA_ONLY = true;
        }
      }
    }
  } catch(e){ /* ignore */ }

  // User's manual preference wins over auto-detect
  try {
    var saved = localStorage.getItem("jm_petty_photo_mode");
    if(saved === "camera") window.PHOTO_CAMERA_ONLY = true;
    else if(saved === "any") window.PHOTO_CAMERA_ONLY = false;
  } catch(e){ /* ignore */ }

  /* ---------- storage layer ----------
     Priority: artifact window.storage  ->  IndexedDB  ->  localStorage  ->  memory.
     This makes the app persist data in the browser when hosted anywhere (e.g. GitHub Pages). */
  var mem = {};
  var memStore = {
    get: function(k){ return Promise.resolve(k in mem ? {key:k,value:mem[k]} : null); },
    set: function(k,v){ mem[k]=v; return Promise.resolve({key:k,value:v}); },
    delete: function(k){ delete mem[k]; return Promise.resolve({key:k,deleted:true}); },
    list: function(p){ var ks=Object.keys(mem).filter(function(k){return !p||k.indexOf(p)===0;}); return Promise.resolve({keys:ks}); }
  };
  function makeLocalStore(){
    var PRE='jmpc:';
    return {
      get:function(k){ try{ var v=window.localStorage.getItem(PRE+k); return Promise.resolve(v!=null?{key:k,value:v}:null);}catch(e){ return memStore.get(k);} },
      set:function(k,v){ try{ window.localStorage.setItem(PRE+k,v);}catch(e){ mem[k]=v; } return Promise.resolve({key:k,value:v}); },
      delete:function(k){ try{ window.localStorage.removeItem(PRE+k);}catch(e){} delete mem[k]; return Promise.resolve({key:k,deleted:true}); },
      list:function(p){ var ks=[]; try{ for(var i=0;i<window.localStorage.length;i++){ var key=window.localStorage.key(i); if(key.indexOf(PRE)===0){ var bare=key.slice(PRE.length); if(!p||bare.indexOf(p)===0) ks.push(bare);} } }catch(e){} return Promise.resolve({keys:ks}); }
    };
  }
  function makeIDBStore(){
    var DB='jm_petty_cash', ST='kv', dbp=null;
    function open(){ if(dbp) return dbp; dbp=new Promise(function(res,rej){ var rq=window.indexedDB.open(DB,1); rq.onupgradeneeded=function(){ rq.result.createObjectStore(ST); }; rq.onsuccess=function(){ res(rq.result); }; rq.onerror=function(){ rej(rq.error); }; }); return dbp; }
    function run(mode,fn){ return open().then(function(db){ return new Promise(function(res,rej){ var tx=db.transaction(ST,mode); var os=tx.objectStore(ST); var req=fn(os); req.onsuccess=function(){ res(req.result); }; req.onerror=function(){ rej(req.error); }; }); }); }
    return {
      get:function(k){ return run('readonly',function(os){return os.get(k);}).then(function(v){ return v!=null?{key:k,value:v}:null; }); },
      set:function(k,v){ return run('readwrite',function(os){return os.put(v,k);}).then(function(){ return {key:k,value:v}; }); },
      delete:function(k){ return run('readwrite',function(os){return os.delete(k);}).then(function(){ return {key:k,deleted:true}; }); },
      list:function(p){ return run('readonly',function(os){return os.getAllKeys();}).then(function(keys){ return {keys:(keys||[]).map(String).filter(function(k){return !p||k.indexOf(p)===0;})}; }); }
    };
  }
  function makeFirestoreStore(db){
    var COL='appdata', PCOL='photos';
    function pid(k){ return k.replace(/[^A-Za-z0-9_-]/g,'_'); }
    return {
      get:function(k){
        if(k.indexOf('photo:')===0){ return db.collection(PCOL).doc(pid(k)).get().then(function(s){ return s.exists?{key:k,value:s.data().v}:null; }); }
        return db.collection(COL).doc(k).get().then(function(s){ return s.exists?{key:k,value:s.data().v}:null; });
      },
      set:function(k,v){

  /* ---------- Thai baht text ---------- */
  function bahtText(amount){
    amount=parseFloat(amount); if(isNaN(amount)) return '';
    var neg=amount<0; amount=Math.abs(amount).toFixed(2);
    var parts=amount.split('.'); var intPart=parts[0], dec=parts[1];
    var th=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
    var unit=['','สิบ','ร้อย','พัน','หมื่น','แสน'];
    function readGroup(s){ var r='',L=s.length; for(var i=0;i<L;i++){ var d=+s[i],p=L-1-i; if(!d)continue;
      if(p===0&&d===1&&L>1) r+='เอ็ด'; else if(p===1&&d===1) r+='สิบ'; else if(p===1&&d===2) r+='ยี่สิบ'; else r+=th[d]+unit[p]; } return r; }
    function readNum(num){ num=num.replace(/^0+/,'')||'0'; if(num==='0')return 'ศูนย์'; var g=[],s=num;
      while(s.length>6){ g.unshift(s.slice(-6)); s=s.slice(0,-6);} g.unshift(s);
      var r=''; for(var i=0;i<g.length;i++){ var gv=readGroup(g[i]); if(gv)r+=gv+(i<g.length-1?'ล้าน':''); else if(i<g.length-1&&r)r+='ล้าน'; } return r; }
    var res=readNum(intPart)+'บาท';
    if(dec==='00') res+='ถ้วน'; else res+=readGroup((dec.replace(/^0+/,'')||'0'))+'สตางค์';
    return (neg?'ลบ':'')+res;
  }

  /* ---------- photo: compress + store ---------- */
  function compress(file){
    return new Promise(function(res,rej){
      var reader=new FileReader();
      reader.onload=function(){
        var img=new Image();
        img.onload=function(){
          var max=1100, w=img.width, h=img.height;
          if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max;} else { w=Math.round(w*max/h); h=max; } }
          var c=document.createElement('canvas'); c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          res(c.toDataURL('image/jpeg',0.62));
        };
        img.onerror=rej; img.src=reader.result;
      };
      reader.onerror=rej; reader.readAsDataURL(file);
    });
  }

  function fillTxList(container,list,withActions){
    container.innerHTML='';
    list.forEach(function(t){
      var r=el('div','row');
      var thumb=el('div','thumb', t.hasPhoto?'<span>🧾</span>':(t.kind==='topup'?'💵':'📄'));
      thumb.dataset.photo=t.id;
      if(t.hasPhoto){ thumb.style.cursor='pointer'; getPhoto(t.id).then(function(d){ if(d) thumb.innerHTML='<img src="'+d+'">'; }); thumb.addEventListener('click',function(){ viewReceipt(t.id); }); }
      var main=el('div','row-main');
      var meta='<span>'+fmtDate(t.ts)+'</span>';
      if(t.round) meta+='<span class="pill">รอบ '+t.round+'</span>';
      if(t.project) meta+='<span class="pill cat">'+esc(t.project)+'</span>';
      if(t.category) meta+='<span class="pill">'+esc(t.category)+'</span>';
      if(t.kind==='expense'){ meta+= t.reimbursed?'<span class="pill ok">✓ โอนคืนแล้ว</span>':'<span class="pill pend">⏳ รอโอนคืน</span>'; }
      var who = t.employee||t.payee;
      main.innerHTML='<div class="row-title">'+esc(t.note||(t.kind==='topup'?'เติมเงินสดย่อย':'รายจ่าย'))+(who?(' · '+esc(who)):'')+'</div><div class="row-meta">'+meta+'</div>';
      var amt=el('div','row-amt '+(t.kind==='topup'?'pos':'neg'), (t.kind==='topup'?'+':'−')+fmt(t.amount));
      r.appendChild(thumb); r.appendChild(main); r.appendChild(amt);
      if(withActions){
        var act=el('div',null);act.style.cssText='display:flex;flex-direction:column;gap:4px;margin-left:6px';
        if(t.kind==='expense'){
          var rb=el('button','btn ghost sm', t.reimbursed?'↩︎':'💸'); rb.title=t.reimbursed?'ยกเลิกโอนคืน':'ทำเครื่องหมายโอนคืนแล้ว';
          rb.classList.add('admin-only'); rb.addEventListener('click',function(){ toggleReimbursed(t.id); });
          act.appendChild(rb);
        }
        var pv=el('button','btn ghost sm','🖨️'); pv.title='พิมพ์ใบสำคัญ'; pv.addEventListener('click',function(){ printVoucher(t); });
        act.appendChild(pv);
        var dl=el('button','btn ghost sm admin-only','🗑️'); dl.title='ลบ'; dl.style.color='var(--expense)'; dl.addEventListener('click',function(){ deleteTx(t.id); });
        act.appendChild(dl); r.appendChild(act);
      }
      container.appendChild(r);
    });
  }

  async function toggleReimbursed(id){
    var t=state.tx.find(function(x){return x.id===id;}); if(!t)return;
    t.reimbursed=!t.reimbursed; t.reimbursedTs=t.reimbursed?Date.now():null;
    await sSet('tx',state.tx); render(); toast(t.reimbursed?'ทำเครื่องหมายโอนคืนพนักงานแล้ว':'ยกเลิกการโอนคืน');
  }

  function renderLedger(){
    var rounds=state.rounds.slice().sort(function(a,b){return b.no-a.no;});
    var h='<div class="card pad stack">';
    h+='<div class="sec-title" style="margin:0">สมุดรายการเงินสดย่อย</div>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
    h+='<select id="filterRound" style="width:auto;padding:8px 12px;font-size:13.5px"><option value="">ทุกรอบ</option>'+rounds.map(function(r){return '<option value="'+r.no+'">รอบ '+r.no+(r.status==='open'?' (เปิด)':'')+'</option>';}).join('')+'</select>';
    h+='<select id="filterProj" style="width:auto;padding:8px 12px;font-size:13.5px"><option value="">ทุกโครงการ</option>'+knownProjects().map(function(p){return '<option>'+esc(p)+'</option>';}).join('')+'</select>';
    h+='<select id="filterReim" style="width:auto;padding:8px 12px;font-size:13.5px"><option value="">โอนคืน: ทั้งหมด</option><option value="no">ยังไม่โอนคืน</option><option value="yes">โอนคืนแล้ว</option></select>';
    h+='</div>';
    h+='<div id="ledgerList"></div></div>';
    $('#page-ledger').innerHTML=h;
    var fr=$('#filterRound'), fp=$('#filterProj'), fm=$('#filterReim');
    function refresh(){
      var list=state.tx.slice().sort(function(a,b){return b.ts-a.ts;});
      if(fr.value) list=list.filter(function(t){return String(t.round)===fr.value;});
      if(fp.value) list=list.filter(function(t){return t.project===fp.value;});
      if(fm.value==='no') list=list.filter(function(t){return t.kind==='expense'&&!t.reimbursed;});
      if(fm.value==='yes') list=list.filter(function(t){return t.kind==='expense'&&t.reimbursed;});
      var box=$('#ledgerList');
      if(!list.length){ box.innerHTML='<div class="empty">ไม่มีรายการ</div>'; return; }
      fillTxList(box,list,true);
    }
    fr.addEventListener('change',refresh); fp.addEventListener('change',refresh); fm.addEventListener('change',refresh);
    refresh();
  }

  function wirePhotos(){
    document.querySelectorAll('[data-pslot]').forEach(function(slot){
      var name=slot.getAttribute('data-pslot');
      var inp=document.querySelector('[data-pinput="'+name+'"]');
      slot.addEventListener('click',function(){ inp.click(); });
      inp.addEventListener('change',async function(e){
        var f=e.target.files[0]; if(!f)return;
        slot.innerHTML='<div style="color:var(--muted)">กำลังประมวลผลรูป…</div>';
        var d=await compress(f); pendingPhotos[name]=d;
        slot.innerHTML='<img src="'+d+'"><button class="rm" type="button">ลบรูป ✕</button>';
        slot.querySelector('.rm').addEventListener('click',function(ev){ ev.stopPropagation(); pendingPhotos[name]=null; slot.innerHTML='<span class="photo-ic">📷</span><div>แนบรูปใหม่</div>'; });
      });
    });
  }

  function approveRequest(id){
    var rq=state.requests.find(function(r){return r.id===id;}); if(!rq)return;
    requirePin('ใส่รหัสอนุมัติเพื่ออนุมัติคำขอของ '+esc(rq.requester), function(){ doApprove(rq); });
  }
  async function doApprove(rq){
    if(rq.amount>balance() && !confirm('จำนวนที่ขอเบิกมากกว่าเงินคงเหลือ ต้องการอนุมัติต่อไปหรือไม่?')) return;
    ensureRound();
    rq.status='approved';
    var v=nextVoucher(); rq.voucher=v;
    var txId=uid();
    var t={id:txId,kind:'expense',amount:rq.amount,note:rq.reason,employee:rq.requester,payee:rq.requester,project:rq.project||'',round:roundNo(),reimbursed:false,reimbursedTs:null,idCard:rq.idCard||'',address:rq.address||'',phone:rq.phone||'',category:rq.category,ts:Date.now(),voucher:v,hasPhoto:rq.hasPhoto,hasId:!!rq.hasId,reqId:rq.id};
    if(rq.hasPhoto){ var d=await getPhoto('req:'+rq.id); if(d) await setPhoto(txId,d); }
    if(rq.hasId){ var di=await getPhoto('reqid:'+rq.id); if(di) await setPhoto('id:'+txId,di); }
    await rememberProject(rq.project);
    state.tx.push(t);
    await sSet('tx',state.tx); await sSet('requests',state.requests); await sSet('config',state.config); await sSet('rounds',state.rounds);
    render(); toast('อนุมัติและหักยอดแล้ว (ยังไม่โอนคืนพนักงาน)'); printVoucher(t);
  }

    body+='  <tr><th class="baht">บาท</th><th class="sat">ส.ต.</th></tr>';
    body+='  <tr><td class="desc">'+esc(t.note||'')+(t.category?' <span style="color:#777">('+esc(t.category)+')</span>':'')+'</td><td class="baht">'+baht.toLocaleString('th-TH')+'</td><td class="sat">'+satStr+'</td></tr>';
    for(var i=0;i<3;i++) body+='<tr class="blank"><td class="desc">&nbsp;</td><td class="baht"></td><td class="sat"></td></tr>';
    body+='  <tr class="totrow"><td class="desc" style="text-align:center">รวมเป็นเงิน</td><td class="baht">'+baht.toLocaleString('th-TH')+'</td><td class="sat">'+satStr+'</td></tr>';
    body+=' </table>';
    body+=' <div class="pv-bahttxt">(ตัวอักษร: '+bahtText(t.amount)+')</div>';
    body+=' <div class="pv-photos">';
    body+='  <div class="pv-photo"><div class="cap">รูปสินค้า</div><div class="frame">'+(idImg?'<img src="'+idImg+'">':'')+'</div></div>';
    body+='  <div class="pv-photo"><div class="cap">รูปสลิป หรือ ใบเสร็จ</div><div class="frame">'+(recImg?'<img src="'+recImg+'">':'')+'</div></div>';
    body+=' </div>';
    body+=' <div class="pv-signs">';
    body+='  <div class="pv-sign">ลงชื่อ <span class="l"></span> ผู้รับเงิน<br><span class="d">( วันที่ ............ )</span></div>';
    body+='  <div class="pv-sign">ลงชื่อ <span class="l"></span> ผู้อนุมัติ<br><span class="d">( วันที่ ............ )</span></div>';
    body+=' </div>';
    body+='</div>';
    showPrint(body);
  }

  function buildSummary(opts){
    var cur=esc(state.config.currency);
    var from=opts.from, to=opts.to, roundFilter=opts.round;
    var list=state.tx.filter(function(t){
      if(roundFilter!=null) return t.round===roundFilter;
      return t.ts>=from && t.ts<=to;
    }).sort(function(a,b){return a.ts-b.ts;});
    var opening=0;
    if(roundFilter==null){ state.tx.forEach(function(t){ if(t.ts<from) opening+=(t.kind==='topup'?+t.amount:-t.amount); }); }
    var totExp=0,totIn=0,run=opening;
    var rows='';
    list.forEach(function(t){
      var isExp=t.kind==='expense';
      if(isExp) totExp+=+t.amount; else totIn+=+t.amount;
      run += isExp? -t.amount : +t.amount;
      var reim = isExp ? (t.reimbursed?'โอนคืนแล้ว':'ค้างโอน') : '-';
      rows+='<tr><td>'+fmtDateOnly(t.ts)+'</td><td>'+esc(t.voucher||'-')+'</td><td>'+esc(t.note||'-')+'</td><td>'+esc(t.employee||t.payee||'-')+'</td><td>'+esc(t.project||'-')+'</td><td>'+reim+'</td>'+
        '<td class="num">'+(isExp?fmt(t.amount):'')+'</td><td class="num">'+(!isExp?fmt(t.amount):'')+'</td><td class="num">'+fmt(run)+'</td></tr>';
    });
    var closing=opening+totIn-totExp;
    var rd = roundFilter!=null ? state.rounds.find(function(r){return r.no===roundFilter;}) : null;
    var owe=0; list.forEach(function(t){ if(t.kind==='expense'&&!t.reimbursed) owe+=+t.amount; });

    var body='<div class="doc">';
    body+=docHeader('ใบสรุปเงินสดย่อย'+(rd?(' รอบที่ '+rd.no):''),'');
    if(rd){
      var rps=roundProjects(rd.no);
      body+='<div class="doc-meta"><div>รอบที่ '+rd.no+' · เริ่ม '+fmtDateOnly(rd.startTs)+' · '+(rd.endTs?('สิ้นสุด '+fmtDateOnly(rd.endTs)):'ยังเปิดอยู่')+'</div><div>วงเงิน: '+fmt(state.config.fund)+' '+cur+'</div></div>';
      body+='<div style="font-size:13px;margin:-6px 0 6px">โครงการในรอบนี้: '+(rps.length?esc(rps.join(', ')):'—')+'</div>';
    } else {
      body+='<div class="doc-meta"><div>ระหว่างวันที่ '+fmtDateOnly(from)+' ถึง '+fmtDateOnly(to)+'</div><div>วงเงิน: '+fmt(state.config.fund)+' '+cur+'</div></div>';
    }
    if(state.config.custodian) body+='<div style="font-size:13px;margin-bottom:6px">ผู้ถือเงินสดย่อย: '+esc(state.config.custodian)+'</div>';
    body+='<table><tr><th>วันที่</th><th>เลขที่</th><th>รายการ</th><th>ผู้เบิก</th><th>โครงการ</th><th>โอนคืน</th><th class="num">จ่าย</th><th class="num">รับ/เติม</th><th class="num">คงเหลือ</th></tr>';
    if(roundFilter==null) body+='<tr><td colspan="8">ยอดยกมา</td><td class="num">'+fmt(opening)+'</td></tr>';
    body+=(rows||'<tr><td colspan="9" style="text-align:center;color:#777">ไม่มีรายการ</td></tr>');
    body+='<tr class="totrow"><td colspan="6">รวม</td><td class="num">'+fmt(totExp)+'</td><td class="num">'+fmt(totIn)+'</td><td class="num">'+fmt(closing)+'</td></tr>';
    body+='</table>';
    body+='<div class="baht-txt">ยอดคงเหลือ: '+fmt(closing)+' '+cur+' ('+bahtText(closing)+')</div>';
    body+='<div class="baht-txt" style="font-style:normal">ค้างโอนคืนพนักงานในสรุปนี้: '+fmt(owe)+' '+cur+'</div>';
    body+='<div class="signs"><div class="sign"><div class="ln"></div>ผู้จัดทำ<br>('+esc(state.config.custodian||'..................')+')</div><div class="sign"><div class="ln"></div>ผู้ตรวจสอบ<br>(..................)</div><div class="sign"><div class="ln"></div>ผู้อนุมัติ / CEO<br>(..................)</div></div>';
    body+='</div>';
    return body;
  }

  function openSummary(){
    var now=new Date();
    var first=new Date(now.getFullYear(),now.getMonth(),1);
    function di(d){ return d.toISOString().slice(0,10); }
    var rounds=state.rounds.slice().sort(function(a,b){return b.no-a.no;});
    openSheet('ออกใบสรุปเงินสดย่อย',
      '<div class="field"><label class="fl">เลือกตามรอบ</label><select id="sumRound"><option value="">— ใช้ช่วงวันที่ด้านล่าง —</option>'+rounds.map(function(r){return '<option value="'+r.no+'">รอบที่ '+r.no+' ('+fmtDateOnly(r.startTs)+(r.endTs?(' - '+fmtDateOnly(r.endTs)):' - ปัจจุบัน')+')</option>';}).join('')+'</select></div>'+
      '<div class="field"><label class="fl">ตั้งแต่วันที่</label><input id="sumFrom" type="date" value="'+di(first)+'"></div>'+
      '<div class="field"><label class="fl">ถึงวันที่</label><input id="sumTo" type="date" value="'+di(now)+'"></div>'+
      '<button class="btn primary" id="sumGo" style="margin-top:16px">ดูตัวอย่าง & พิมพ์</button>',
      function(){
        $('#sumGo').addEventListener('click',function(){
          var rv=$('#sumRound').value;
          closeSheet();
          if(rv){ showPrint(buildSummary({round:parseInt(rv,10)})); }
          else {
            var f=new Date($('#sumFrom').value+'T00:00:00').getTime();
            var t=new Date($('#sumTo').value+'T23:59:59').getTime();
            showPrint(buildSummary({from:f,to:t}));
          }
        });
      });
  }

  function showPrint(bodyHTML){
    var pa=$('#printArea');
    pa.innerHTML='<div class="print-actions"><button class="btn sm" id="closePrint">← กลับ</button><button class="btn sm primary" id="doPrint">🖨️ พิมพ์ / บันทึก PDF</button></div>'+bodyHTML;
    pa.style.display='block';
    $('#mainApp').style.display='none';
    var rootEl=document.getElementById('root'); if(rootEl && rootEl.scrollIntoView) try{ rootEl.scrollIntoView({block:'start'}); }catch(e){}
    $('#doPrint').addEventListener('click',function(){ window.print(); });
    $('#closePrint').addEventListener('click',function(){ pa.style.display='none'; pa.innerHTML=''; $('#mainApp').style.display='block'; });
  }

  /* ============================================================ BACKUP ============================================================ */
  async function exportData(){
    var data={ _app:'jm-petty-cash', _ver:1, exportedAt:Date.now(), config:state.config, tx:state.tx, requests:state.requests, rounds:state.rounds, photos:{} };
    try{
      var keys=((await store.list('photo:',false))||{}).keys||[];
      for(var i=0;i<keys.length;i++){ var k=keys[i]; var r=await store.get(k,false); if(r&&r.value!=null){ try{ data.photos[k]=JSON.parse(r.value); }catch(e){ data.photos[k]=r.value; } } }
    }catch(e){}
    var blob=new Blob([JSON.stringify(data)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download='jm-petty-cash-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); },1500);
    toast('สำรองข้อมูลแล้ว');
  }
  async function importData(file){
    var text=await file.text(); var data;
    try{ data=JSON.parse(text); }catch(e){ toast('อ่านไฟล์ไม่ได้'); return; }
    if(!data || !data.config){ toast('ไฟล์สำรองไม่ถูกต้อง'); return; }
    if(!confirm('นำเข้าข้อมูลจากไฟล์นี้? ข้อมูลปัจจุบันทั้งหมดจะถูกแทนที่')) return;
    try{ var old=((await store.list('photo:',false))||{}).keys||[]; for(var i=0;i<old.length;i++) await store.delete(old[i],false); }catch(e){}
    state.config=data.config; if(!state.config.role) state.config.role='admin'; if(!state.config.projects) state.config.projects=[];
    state.tx=data.tx||[]; state.requests=data.requests||[]; state.rounds=data.rounds||[];
    photoCache={};
    await sSet('config',state.config); await sSet('tx',state.tx); await sSet('requests',state.requests); await sSet('rounds',state.rounds);
    var ph=data.photos||{}; var pk=Object.keys(ph);
    for(var j=0;j<pk.length;j++){ var key=pk[j]; var bare=key.indexOf('photo:')===0?key.slice(6):key; await setPhoto(bare,ph[key]); }
    applyRole();
    render(); go('home'); toast('นำเข้าข้อมูลเรียบร้อย');
  }

  /* ============================================================ NAV ============================================================ */
  function go(tab){
    if(tab==='settings' && !isAdmin()) tab='overview';
    document.querySelectorAll('.page').forEach(function(p){ p.classList.toggle('active', p.id==='page-'+tab); });
    document.querySelectorAll('.nav button').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); });
    window.scrollTo(0,0);
  }

  /* ============================================================ BOOT ============================================================ */
  function buildShell(){
    var root=document.getElementById('root');
    root.innerHTML=''+
    '<div class="topbar"><div class="topbar-inner"><div class="brandmark"><div class="logo-box" id="logoBox">JM</div><div><div class="brand-title" id="orgName">เงินสดย่อย</div><div class="brand-sub">ระบบเบิกเงินสดย่อย</div></div></div><div id="lockBadge" style="margin-left:auto"></div></div></div>'+
    '<div id="mainApp"><div class="wrap">'+
    '  <div class="page active" id="page-home"></div>'+
    '  <div class="page" id="page-overview"></div>'+
    '  <div class="page" id="page-ledger"></div>'+
    '  <div class="page" id="page-request"></div>'+
    '  <div class="page" id="page-settings"></div>'+
    '</div></div>'+
    '<div id="printArea"></div>'+
    '<div class="nav"><div class="nav-inner" id="navInner">'+
    '  <button data-tab="home" class="active"><span class="ic">🏠</span>หน้าหลัก</button>'+
    '  <button data-tab="overview"><span class="ic">📊</span>ภาพรวม</button>'+
    '  <button data-tab="ledger"><span class="ic">📒</span>รายการ</button>'+
    '  <button data-tab="request"><span class="ic">📝</span>ขอเบิก</button>'+
    '  <button data-tab="settings"><span class="ic">⚙️</span>ตั้งค่า</button>'+
    '</div></div>'+
    '<div class="overlay" id="overlay"><div class="sheet"><div class="sheet-h"><h3 id="sheetTitle"></h3><button class="xbtn" id="sheetClose">✕</button></div><div id="sheetBody"></div></div></div>'+
    '<div class="toast" id="toast"></div>';

    document.querySelectorAll('.nav button').forEach(function(b){ b.addEventListener('click',function(){ go(b.dataset.tab); }); });
    $('#sheetClose').addEventListener('click',closeSheet);
    $('#overlay').addEventListener('click',function(e){ if(e.target===$('#overlay')) closeSheet(); });

    // delegated action buttons
    document.getElementById('root').addEventListener('click',function(e){
      var a=e.target.closest('[data-act]'); if(a){ var act=a.dataset.act;
        if(act==='open-expense'){ if(!(state.config.fund>0)&&state.tx.length===0){ toast('โปรดตั้งวงเงินที่หน้าตั้งค่าก่อน'); go('settings'); return;} openExpense(); }
        else if(act==='open-request') openRequest();
        else if(act==='open-topup') openTopup();
        else if(act==='open-summary') openSummary();
        else if(act==='close-round') closeRound();
        return;
      }
      var tb=e.target.closest('[data-tab]'); if(tb){ go(tb.dataset.tab); }
    });
    applyRole();
  }

  function applyRole(){
    var lb=$('#lockBadge');
    if(!lb) return;
    var cloud = CLOUD ? '<span class="cloud-on">☁︎ ซิงก์คลาวด์</span>' : '<span class="cloud-off">⚠ ในเครื่อง</span>';
    var lock = hasPin() ? '<span class="lock-on">🔒</span>' : '<span class="lock-off">🔓</span>';
    lb.innerHTML = cloud+' '+lock;
  }

  async function boot(){
    await migrateLocalToCloudIfNeeded();
    state.config = await sGet('config', state.config);
    if(!state.config.currency) state.config.currency='บาท';
    if(!state.config.role) state.config.role='admin';
    if(!state.config.projects) state.config.projects=[];
    if(state.config.custodian==null) state.config.custodian='';
    if(state.config.roundCounter==null) state.config.roundCounter=0;
    state.tx = await sGet('tx', []);
    state.requests = await sGet('requests', []);
    state.rounds = await sGet('rounds', []);
    // migrate: if there are transactions but no round, create round 1 over all of them
    if(state.tx.length && !state.rounds.length){
      var first=state.tx.reduce(function(m,t){return Math.min(m,t.ts);},Date.now());
      state.config.roundCounter=1;
      state.rounds=[{no:1,startTs:first,endTs:null,status:'open',closeNote:''}];
      state.tx.forEach(function(t){ if(t.round==null) t.round=1; if(t.kind==='expense'&&t.reimbursed==null) t.reimbursed=false; });
      await sSet('rounds',state.rounds); await sSet('tx',state.tx); await sSet('config',state.config);
    }
    buildShell();
    render();
    booted=true;
    subscribeCloud();
    if(!(state.config.fund>0) && state.tx.length===0){ toast(CLOUD?'เริ่มต้น: ตั้งวงเงินและผู้ถือเงินสดย่อยที่หน้าตั้งค่า':'⚠ เชื่อมคลาวด์ไม่ได้ กำลังใช้โหมดเก็บในเครื่อง'); }
  }
  boot();
})();
</script>
</body>
