<style>
  :root{
    --bg:#F5F2EB;--surface:#FFFFFF;--surface-2:#FAF7F0;
    --line:#E5DFCE;--line-2:#EDE7D8;
    --ink:#0F1836;--muted:#6B7280;
    --navy:#1B2A5B;--navy-2:#243668;--navy-3:#0F1836;--navy-soft:#E4E8F2;
    --gold:#B8894A;--gold-2:#D4A574;--gold-3:#9E7239;--gold-soft:#F5EDD9;
    --success:#15803D;--success-soft:#E4F0E5;
    --danger:#B4421F;--danger-soft:#FBEAE3;
    --warn:#B45309;--warn-soft:#FDF1DE;
    --info:#1E4B7A;--info-soft:#DFEBF6;
    --shadow:0 1px 2px rgba(15,24,54,.06),0 6px 18px rgba(15,24,54,.06);
    --shadow-lg:0 4px 8px rgba(15,24,54,.08),0 16px 32px rgba(15,24,54,.10);
    --font:'IBM Plex Sans Thai','Sarabun',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:0}
  a{color:inherit;text-decoration:none}
  input,select,textarea{font-family:inherit}

  .top{position:sticky;top:0;z-index:30;background:rgba(245,242,235,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 0}
  .top-in{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:12px}
  .back-btn{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--line);color:var(--navy);display:inline-flex;align-items:center;gap:6px}
  .back-btn:hover{background:var(--surface-2)}
  .top-title{font-weight:700;font-size:16px;color:var(--navy);flex:1}
  .top-title span{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.15em;text-transform:uppercase;display:block}

  .wrap{max-width:1180px;margin:0 auto;padding:20px}
  .btn{padding:9px 14px;border-radius:9px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
  .btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;box-shadow:0 2px 6px rgba(27,42,91,.20)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(27,42,91,.28)}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--surface-2)}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-3));color:#fff;box-shadow:0 2px 6px rgba(184,137,74,.22)}
  .btn-gold:hover{transform:translateY(-1px)}
  .btn-danger{background:var(--danger-soft);color:var(--danger)}
  .btn-success{background:var(--success);color:#fff}
  .btn-sm{padding:6px 11px;font-size:12px}

  /* Summary strip */
  .sum-strip{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;
  }
  .sum-card{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .sum-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--navy)}
  .sum-card.gold:before{background:var(--gold)}
  .sum-card.success:before{background:var(--success)}
  .sum-card.warn:before{background:var(--warn)}
  .sum-card .lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
  .sum-card .val{font-size:22px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums}
  .sum-card .sub{font-size:11px;color:var(--muted);margin-top:2px}

  /* Tabs */
  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px;overflow-x:auto}
  .tab-btn{
    padding:10px 18px;background:transparent;color:var(--muted);font-weight:600;font-size:14px;
    border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;
  }
  .tab-btn:hover{color:var(--navy)}
  .tab-btn.active{color:var(--navy);border-bottom-color:var(--gold)}
  .tab-btn .badge{
    display:inline-block;padding:1px 8px;background:var(--danger);color:#fff;
    border-radius:99px;font-size:10px;font-weight:700;margin-left:6px;vertical-align:middle;
  }
  .tab-content{display:none}
  .tab-content.active{display:block}

  /* Cards grid */
  .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--gold-2)}
  .card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--navy),var(--gold))}
  .card .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
  .card .nm{font-weight:700;color:var(--navy);font-size:15px;line-height:1.3;flex:1}
  .card .tag{font-size:10.5px;padding:2px 8px;border-radius:99px;background:var(--navy-soft);color:var(--navy);font-weight:600;white-space:nowrap}
  .card .tag.gold{background:var(--gold-soft);color:var(--gold-3)}
  .card .tag.success{background:var(--success-soft);color:var(--success)}
  .card .tag.warn{background:var(--warn-soft);color:var(--warn)}
  .card .tag.danger{background:var(--danger-soft);color:var(--danger)}
  .card .sub{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .card .money-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px dashed var(--line)}
  .card .money-row:last-child{border-bottom:0}
  .card .money-row .k{color:var(--muted)}
  .card .money-row .v{font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
  .card .money-row .v.paid{color:var(--success)}
  .card .money-row .v.remaining{color:var(--warn)}
  .progress-bar{height:6px;background:var(--surface-2);border-radius:99px;margin-top:8px;overflow:hidden}
  .progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--success),#4CAF50);border-radius:99px;transition:width .3s}

  /* toolbar */
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .toolbar .search{flex:1;min-width:180px;position:relative}
  .toolbar .search input{width:100%;padding:10px 14px 10px 36px;background:var(--surface);border:1px solid var(--line);border-radius:10px;font-size:14px;outline:none}
  .toolbar .search:before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty .ic{font-size:52px;margin-bottom:10px;opacity:.5}
  .empty h3{color:var(--ink);margin-bottom:4px}

  /* modal */
  .mask{position:fixed;inset:0;background:rgba(15,24,54,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
  .mask.show{display:flex}
  .modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:720px;max-height:94vh;overflow:hidden;display:flex;flex-direction:column}
  .modal-hd{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .modal-hd h3{font-size:16px;font-weight:700;color:var(--navy);flex:1}
  .modal-x{width:32px;height:32px;border-radius:8px;background:var(--surface-2);color:var(--muted);display:grid;place-items:center;font-size:18px}
  .modal-x:hover{background:var(--danger-soft);color:var(--danger)}
  .modal-body{padding:16px 20px;overflow-y:auto;flex:1}
  .modal-ft{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;background:var(--surface-2);flex-wrap:wrap}

  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .fld input,.fld textarea,.fld select{width:100%;padding:10px 12px;background:var(--surface-2);border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;color:var(--ink);outline:none;font-family:inherit}
  .fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--navy);background:#fff;box-shadow:0 0 0 3px var(--navy-soft)}
  .fld textarea{min-height:70px;resize:vertical;line-height:1.55}
  .fld-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .worktype{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .worktype label{cursor:pointer;padding:14px;border:2px solid var(--line);border-radius:12px;background:var(--surface-2);text-align:center;transition:.15s;font-weight:600}
  .worktype label:hover{border-color:var(--gold-2)}
  .worktype input:checked + span{color:var(--navy)}
  .worktype label:has(input:checked){border-color:var(--navy);background:var(--navy-soft)}
  .worktype .ic{font-size:28px;display:block;margin-bottom:6px}
  .worktype input{display:none}

  .floor-row{
    display:grid;grid-template-columns:1fr 140px 1fr 40px;gap:8px;margin-bottom:8px;
    padding:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;
  }
  .floor-row input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .floor-row .amount{text-align:right;font-family:'Sarabun',sans-serif;font-weight:600}

  .tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  .tbl th,.tbl td{border:1px solid var(--line);padding:8px 10px;text-align:left}
  .tbl th{background:var(--surface-2);font-weight:700;color:var(--navy);font-size:12px}
  .tbl td.r,.tbl th.r{text-align:right;font-variant-numeric:tabular-nums}
  .tbl td.c,.tbl th.c{text-align:center}

  .draw-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
  .draw-status.pending{background:var(--warn-soft);color:var(--warn)}
  .draw-status.approved{background:var(--info-soft);color:var(--info)}
  .draw-status.paid{background:var(--success-soft);color:var(--success)}
  .draw-status.rejected{background:var(--danger-soft);color:var(--danger)}

  .slip-preview{margin-top:8px;max-width:200px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .slip-preview img{width:100%;display:block}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;display:none}
  .toast.show{display:block}
  .toast.ok{background:var(--success)}
  .toast.err{background:var(--danger)}

  /* PDF doc */
  .report-doc{background:#fff;color:#0F1836;font-family:var(--font);max-width:794px;margin:0 auto}
  .doc-page{padding:30px;background:#fff;min-height:1123px;display:flex;flex-direction:column}
  .doc-hd{display:flex;align-items:center;gap:16px;padding-bottom:12px;border-bottom:2px solid #1B2A5B;margin-bottom:16px}
  .doc-hd img{height:44px}
  .doc-hd h1{font-family:'Sarabun',sans-serif;font-size:22px;font-weight:900;color:#0F1836;flex:1;text-align:center}
  .doc-hd .doc-no{font-size:11px;color:#6B7280;text-align:right;line-height:1.5}
  .doc-hd .doc-no b{color:#B8894A;font-size:14px}
  .doc-meta{background:#F5EDD9;border-radius:8px;padding:12px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12.5px}
  .doc-meta .k{color:#9E7239;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .doc-meta .v{color:#0F1836;font-weight:500;margin-top:2px}
  .doc-section{margin-bottom:16px}
  .doc-section h3{font-size:12px;color:#B8894A;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding-bottom:4px;border-bottom:1px dashed #E5DFCE;margin-bottom:8px}
  .doc-tbl{width:100%;border-collapse:collapse;font-size:12px}
  .doc-tbl th,.doc-tbl td{border:1px solid #C8C1AE;padding:6px 8px;text-align:left}

  .doc-slip{max-width:280px;border:1px solid #C8C1AE;border-radius:6px;overflow:hidden;margin-top:10px}
  .doc-slip img{width:100%;display:block}
  .doc-sign{margin-top:auto;padding-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:30px;font-size:12px}

<script>
function getSession(){
  try {
    const raw = localStorage.getItem("jm_portal_session_v1");
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(!s || !s.expiresAt || Date.now() > s.expiresAt) return null;
    return s;
  } catch(e){ return null; }
}
const SESSION = getSession();
if(!SESSION){ window.location.href = "index.html"; }

const $ = id => document.getElementById(id);
const esc = s => String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const fmtMoney = n => (+n||0).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtDate = d => d ? new Date(d).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"}) : "";

function toast(msg, kind){
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show" + (kind ? " " + kind : "");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove("show"), 2600);
}
function openMask(id){ $(id).classList.add("show"); }
function closeMask(id){ $(id).classList.remove("show"); }
window.closeMask = closeMask;

function waitFB(){
  return new Promise(res => {
    if(window.FB){ res(window.FB); return; }
    window.addEventListener("fb-ready", ()=>res(window.FB), {once:true});
    setTimeout(()=>{ if(!window.FB) res(null); }, 8000);
  });
}

async function compressImage(file, maxW){
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if(w > maxW){ h = h*maxW/w; w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        res(canvas.toDataURL("image/jpeg", 0.65));
      };
      img.onerror = rej;
      img.src = ev.target.result;
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

let CONTRACTORS = [];
let DRAWS = [];

// ===== Loaders =====
async function loadAll(){
  const FB = await waitFB();
  if(!FB){ toast("เชื่อมต่อไม่ได้", "err"); return; }
  const [pSnap, cSnap, dSnap] = await Promise.all([
    FB.getDocs(FB.collection(FB.db, "pay_projects")),
    FB.getDocs(FB.collection(FB.db, "pay_contractors")),
    FB.getDocs(FB.collection(FB.db, "pay_draws"))
  ]);
  PROJECTS = []; pSnap.forEach(d => PROJECTS.push({id:d.id, ...d.data()}));
  CONTRACTORS = []; cSnap.forEach(d => CONTRACTORS.push({id:d.id, ...d.data()}));
  DRAWS = []; dSnap.forEach(d => DRAWS.push({id:d.id, ...d.data()}));
  PROJECTS.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  DRAWS.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  renderAll();
}

// ===== Business logic =====
function projectTotal(p){
  if(p.workType === "external") return +p.extAmount || 0;
  return (p.floors||[]).reduce((s,f) => s + (+f.amount||0), 0);
}
function projectPaidTotal(pId){
  return DRAWS.filter(d => d.projectId===pId && (d.status==="paid"||d.status==="approved"))
    .reduce((s,d)=>s+(+d.amount||0), 0);
}
function projectPendingTotal(pId){
  return DRAWS.filter(d => d.projectId===pId && d.status==="pending")
    .reduce((s,d)=>s+(+d.amount||0), 0);
}
function projectRemaining(p){
  return projectTotal(p) - projectPaidTotal(p.id);
}
function contractorBalance(cId){
  const projs = PROJECTS.filter(p => p.contractorId === cId);
  return projs.reduce((s,p) => s + projectRemaining(p), 0);
}
function contractorTotal(cId){
  const projs = PROJECTS.filter(p => p.contractorId === cId);
  return projs.reduce((s,p) => s + projectTotal(p), 0);
}
function contractorPaid(cId){
  const projs = PROJECTS.filter(p => p.contractorId === cId);
  return projs.reduce((s,p) => s + projectPaidTotal(p.id), 0);
}

// ===== Render summary strip =====
function renderSummary(){
  const totalProjects = PROJECTS.length;
  const totalContractValue = PROJECTS.reduce((s,p)=>s+projectTotal(p), 0);
  const totalPaid = PROJECTS.reduce((s,p)=>s+projectPaidTotal(p.id), 0);
  const totalRemaining = totalContractValue - totalPaid;
  const pendingCount = DRAWS.filter(d=>d.status==="pending").length;

  $("sumStrip").innerHTML = `
    <div class="sum-card"><div class="lbl">โครงการทั้งหมด</div><div class="val">${totalProjects}</div></div>
    <div class="sum-card gold"><div class="lbl">มูลค่าสัญญารวม</div><div class="val">${fmtMoney(totalContractValue)}</div><div class="sub">บาท</div></div>
    <div class="sum-card success"><div class="lbl">จ่ายแล้ว</div><div class="val">${fmtMoney(totalPaid)}</div><div class="sub">บาท</div></div>
    <div class="sum-card warn"><div class="lbl">คงเหลือ</div><div class="val">${fmtMoney(totalRemaining)}</div><div class="sub">บาท</div></div>

    $("pendingBadge").textContent = pendingCount;

// ===== Draw CRUD =====
function fillProjectSelect(){
  const sel = $("dProject");
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- เลือกโครงการ --</option>' + PROJECTS.map(p => {
    const c = CONTRACTORS.find(x => x.id === p.contractorId);
    return `<option value="${p.id}">${esc(p.name)} (${esc(c?.name||"-")})</option>`;
  }).join("");
  sel.value = cur;
}

function openDrawModal(editId, projectId){
  CURRENT_DRAW_ID = editId || null;
  $("drawModalTitle").textContent = editId ? "✏️ แก้ไขงวด" : "➕ ขอเบิกงวดใหม่";
  fillProjectSelect();
  const today = new Date().toISOString().slice(0,10);
  if(editId){
    const d = DRAWS.find(x => x.id === editId);
    if(!d) return;
    $("dProject").value = d.projectId || "";
    $("dDrawNo").value = d.drawNo || "";
    $("dDate").value = d.date || today;
    $("dDescription").value = d.description || "";
    $("dAmount").value = d.amount || "";
    $("dPercent").value = d.percent || "";
    $("dNote").value = d.note || "";
    onDrawProjectChange(d.floorRefs || []);
  } else {
    $("dProject").value = projectId || "";
    // auto-suggest next draw number
    if(projectId){
      const existing = DRAWS.filter(x => x.projectId === projectId);
      $("dDrawNo").value = existing.length + 1;
    } else {
      $("dDrawNo").value = "";
    }
    $("dDate").value = today;
    ["dDescription","dAmount","dPercent","dNote"].forEach(id => $(id).value = "");
    onDrawProjectChange();
  }
  openMask("drawModal");
}
window.openDrawModal = openDrawModal;

function onDrawProjectChange(selectedFloors){
  const pId = $("dProject").value;
  const p = PROJECTS.find(x => x.id === pId);
  if(!p){ $("dProjectSummary").style.display = "none"; $("dInternalFloors").style.display = "none"; return; }
  const total = projectTotal(p);
  const paid = projectPaidTotal(p.id);
  const remain = total - paid;
  $("dProjectSummary").style.display = "";
  $("dProjectSummary").innerHTML = `
    <div><b>สรุป:</b> มูลค่าสัญญา ${fmtMoney(total)} · จ่ายแล้ว ${fmtMoney(paid)} · <b style="color:var(--warn)">คงเหลือ ${fmtMoney(remain)} บาท</b></div>
  `;
  if(p.workType === "internal" && (p.floors||[]).length){
    $("dInternalFloors").style.display = "";
    $("dFloorChoices").innerHTML = (p.floors||[]).map((f,i) => `
      <label style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;margin-bottom:4px;cursor:pointer;font-size:13px">
        <input type="checkbox" value="${esc(f.name)}" ${(selectedFloors||[]).includes(f.name)?'checked':''} onchange="onFloorPick(this)" data-amount="${f.amount||0}"/>
        <span style="flex:1"><b>${esc(f.name)}</b> ${f.detail?`· ${esc(f.detail)}`:""}</span>
        <span style="font-weight:600;color:var(--navy)">${fmtMoney(f.amount)} บาท</span>
      </label>
    `).join("");
  } else {
    $("dInternalFloors").style.display = "none";
  }
}
window.onDrawProjectChange = onDrawProjectChange;

function onFloorPick(el){
  // auto sum selected floors into amount
  const checked = Array.from(document.querySelectorAll('#dFloorChoices input[type="checkbox"]:checked'));
  const sum = checked.reduce((s,c)=>s+(+c.dataset.amount||0), 0);
  if(sum > 0) $("dAmount").value = sum;
}
window.onFloorPick = onFloorPick;

async function saveDraw(){
  const projectId = $("dProject").value;
  const drawNo = +$("dDrawNo").value;
  const date = $("dDate").value;
  const amount = +$("dAmount").value;
  const description = $("dDescription").value.trim();
  if(!projectId){ toast("เลือกโครงการ","err"); return; }
  if(!drawNo){ toast("กรอกงวดที่","err"); return; }
  if(!date){ toast("กรอกวันที่","err"); return; }
  if(!amount || amount <= 0){ toast("กรอกจำนวนเงิน","err"); return; }
  if(!description){ toast("กรอกรายละเอียด","err"); return; }

  const btn = $("drawSaveBtn"); btn.disabled = true; btn.textContent = "กำลังบันทึก...";
  try {
    const FB = await waitFB();
    const id = CURRENT_DRAW_ID || ("d_"+uid());
    const floorRefs = Array.from(document.querySelectorAll('#dFloorChoices input[type="checkbox"]:checked')).map(c=>c.value);
    const data = {
      projectId, drawNo, date, amount, description,
      percent: +$("dPercent").value || 0,
      floorRefs,
      note: $("dNote").value.trim(),
      status: CURRENT_DRAW_ID ? (DRAWS.find(d=>d.id===CURRENT_DRAW_ID)?.status || "pending") : "pending",
      requestedBy: SESSION.name,
      updatedAt: FB.serverTimestamp()
    };
    if(!CURRENT_DRAW_ID) data.createdAt = FB.serverTimestamp();
    await FB.setDoc(FB.doc(FB.db, "pay_draws", id), data, {merge:true});
    closeMask("drawModal");
    toast("บันทึกคำขอเบิกแล้ว ✓","ok");
    await loadAll();
  } catch(e){ toast(e.message,"err"); }
  finally { btn.disabled = false; btn.textContent = "💾 บันทึกคำขอเบิก"; }
}
window.saveDraw = saveDraw;

async function updateDrawStatus(status, extra){
  const FB = await waitFB();
  const data = { status, updatedAt: FB.serverTimestamp(), ...(extra||{}) };
  await FB.setDoc(FB.doc(FB.db, "pay_draws", CURRENT_DRAW_ID), data, {merge:true});
  await loadAll();
  openDrawDetail(CURRENT_DRAW_ID);
}

async function approveDraw(){
  if(!confirm("อนุมัติงวดนี้? หลังอนุมัติสามารถอัพโหลดสลิปเพื่อยืนยันการโอน")) return;
  await updateDrawStatus("approved", { approvedBy: SESSION.name, approvedAt: new Date().toISOString().slice(0,10) });
  toast("อนุมัติแล้ว รอโอนเงิน", "ok");
}
async function rejectDraw(){
  const reason = prompt("เหตุผลที่ไม่อนุมัติ (ถ้ามี):");
  await updateDrawStatus("rejected", { approvedBy: SESSION.name, approvedAt: new Date().toISOString().slice(0,10), rejectReason: reason||"" });
  toast("ไม่อนุมัติแล้ว", "ok");
}
async function uploadSlip(e){
  const f = e.target.files[0];
  if(!f) return;
  toast("กำลังบีบรูปสลิป...");
  const dataURL = await compressImage(f, 800);
  const transferDate = new Date().toISOString().slice(0,10);
  await updateDrawStatus("paid", { transferSlip: dataURL, transferDate, transferBank: "-" });
  toast("บันทึกสลิป + ยืนยันจ่ายแล้ว ✓", "ok");
  e.target.value = "";
}
async function deleteDraw(){
  if(!confirm("ลบงวดนี้?")) return;
  const FB = await waitFB();
  await FB.deleteDoc(FB.doc(FB.db, "pay_draws", CURRENT_DRAW_ID));
  closeMask("drawDetailModal");
  toast("ลบแล้ว","ok");
  await loadAll();
}

// ===== Export PDF =====
async function exportPDFFromNode(nodeId, filename){
  try {
    toast("กำลังสร้าง PDF...");
    const node = document.getElementById(nodeId);
    const canvas = await html2canvas(node, {scale:2, backgroundColor:"#fff", useCORS:true, logging:false});
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit:"mm", format:"a4", orientation:"portrait"});
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW;
    const imgH = canvas.height * imgW / canvas.width;

    if(imgH <= pageH){
      pdf.addImage(canvas.toDataURL("image/jpeg", 0.92), "JPEG", 0, 0, imgW, imgH);
    } else {
      // multi-page
      const scale = imgW / canvas.width;
      const pageContentPxH = pageH / scale;
      let sy = 0;
      let first = true;
      while(sy < canvas.height){
        const sliceH = Math.min(pageContentPxH, canvas.height - sy);
        const c = document.createElement("canvas");
        c.width = canvas.width; c.height = sliceH;
        c.getContext("2d").drawImage(canvas, 0, sy, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
        if(!first) pdf.addPage();
        pdf.addImage(c.toDataURL("image/jpeg", 0.92), "JPEG", 0, 0, imgW, sliceH*scale);
        sy += sliceH;
        first = false;
      }
    }
    pdf.save(filename);
    toast("บันทึก PDF แล้ว ✓", "ok");
  } catch(e){ toast("ผิดพลาด: "+e.message, "err"); }
}

async function exportDrawPDF(){

  const p = PROJECTS.find(x => x.id === d?.projectId);
  await exportPDFFromNode("drawPDF", `${p?.name||"draw"}_งวด${d?.drawNo||""}_${d?.date||""}.pdf`.replace(/\s+/g,"_"));
}

  const p = PROJECTS.find(x => x.id === CURRENT_PROJECT_ID);

}
