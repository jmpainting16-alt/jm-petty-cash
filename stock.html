<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14171C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="นับสต็อก">
<title>ระบบนับสต็อก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E9EAE6; --card:#FFFFFF; --ink:#14171C; --steel:#6A727E;
    --line:#D7D9D5; --line2:#E7E8E4;
    --signal:#DB5B2A; --signal-d:#B8461C;
    --red:#C0392B; --green:#2F7D52; --amber:#C9821A;
    --th:'IBM Plex Sans Thai',system-ui,sans-serif;
    --mono:'Space Grotesk',ui-monospace,monospace;
    --r:10px; --sh:0 1px 2px rgba(20,23,28,.06),0 1px 0 rgba(20,23,28,.03);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--th);
    font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(20,23,28,.025) 31px,rgba(20,23,28,.025) 32px);}
  .num{font-family:var(--mono);font-feature-settings:"tnum"}
  button{font-family:var(--th);cursor:pointer}
  input,select{font-family:var(--th)}

  /* ---- top bar ---- */
  header{position:sticky;top:0;z-index:30;background:var(--ink);color:#fff;
    border-bottom:3px solid var(--signal)}
  .head-in{max-width:1080px;margin:0 auto;padding:14px 18px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:.2px}
  .logo .mark{width:30px;height:30px;border:2px solid var(--signal);border-radius:6px;
    display:grid;place-items:center;font-family:var(--mono);font-weight:700;color:var(--signal);font-size:15px}
  .head-sp{flex:1}
  .head-stat{display:flex;gap:18px;align-items:center}
  .hs{display:flex;flex-direction:column;line-height:1.1}
  .hs b{font-family:var(--mono);font-size:20px}
  .hs span{font-size:11px;color:#9aa1ab;text-transform:uppercase;letter-spacing:.6px}
  .hs.alert b{color:var(--signal)}

  nav{max-width:1080px;margin:0 auto;padding:0 18px;display:flex;gap:2px;
    border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
  .tab{background:none;border:0;padding:13px 16px 11px;font-size:14px;font-weight:600;flex-shrink:0;white-space:nowrap;
    color:var(--steel);border-bottom:3px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--ink);border-bottom-color:var(--signal)}
  .pill{font-family:var(--mono);font-size:11px;background:var(--signal);color:#fff;
    border-radius:20px;padding:1px 7px;font-weight:700}
  .pill.q{background:var(--line);color:var(--steel)}

  main{max-width:1080px;margin:0 auto;padding:18px}

  /* ---- toolbar ---- */
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .search{flex:1;min-width:180px;position:relative}
  .search input{width:100%;padding:11px 12px 11px 36px;border:1px solid var(--line);
    border-radius:var(--r);background:var(--card);font-size:14px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.45}
  select.f{padding:11px 12px;border:1px solid var(--line);border-radius:var(--r);background:var(--card);font-size:14px}
  .toggle{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--steel);
    padding:0 4px;user-select:none}
  .toggle input{width:16px;height:16px;accent-color:var(--signal)}

  .btn{border:1px solid var(--ink);background:var(--ink);color:#fff;padding:11px 16px;
    border-radius:var(--r);font-weight:600;font-size:14px;white-space:nowrap;display:inline-flex;gap:7px;align-items:center}
  .btn:hover{background:#000}
  .btn.signal{background:var(--signal);border-color:var(--signal)}
  .btn.signal:hover{background:var(--signal-d)}
  .btn.ghost{background:#fff;color:var(--ink)}
  .btn.ghost:hover{background:#f4f4f2}
  .btn.sm{padding:7px 11px;font-size:13px}

  /* ---- alert banner ---- */
  .alertbox{border:1px solid #e7c2b6;background:#FBEEE9;border-left:4px solid var(--signal);
    border-radius:var(--r);padding:13px 15px;margin-bottom:16px}
  .alertbox h4{margin:0 0 8px;font-size:13px;color:var(--signal-d);text-transform:uppercase;letter-spacing:.5px;
    display:flex;align-items:center;gap:7px}
  .alertbox .row{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:6px 0;border-top:1px dashed #e2c8be;font-size:14px}
  .alertbox .row:first-of-type{border-top:0}
  .alertbox .row b{font-family:var(--mono)}

  /* ---- product card ---- */
  .grid{display:grid;gap:12px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);
    padding:14px 16px;display:grid;grid-template-columns:1fr auto;gap:12px;position:relative;overflow:hidden}
  .pcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
  .pcard.low::before{background:var(--amber)}
  .pcard.out::before{background:var(--red)}
  .pmain{min-width:0}
  .pname{font-weight:700;font-size:16px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .sku{font-family:var(--mono);font-size:11px;color:var(--steel);background:var(--paper);
    border:1px solid var(--line2);padding:1px 6px;border-radius:5px}
  .cat{font-size:11px;color:var(--steel)}
  .stamp{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
    padding:2px 8px;border-radius:4px;border:1.5px solid;line-height:1.4}
  .stamp.ok{color:var(--green);border-color:var(--green)}
  .stamp.low{color:var(--amber);border-color:var(--amber)}
  .stamp.out{color:var(--red);border-color:var(--red)}
  .sites{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .stag{font-size:12px;background:var(--paper);border:1px solid var(--line2);border-radius:6px;
    padding:3px 8px;display:flex;gap:6px;align-items:center}
  .stag b{font-family:var(--mono)}
  .pright{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:10px}
  .total{text-align:right;line-height:1}
  .total b{font-family:var(--mono);font-size:30px;font-weight:700;display:block}
  .total span{font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:.5px}
  .acts{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .mini{border:1px solid var(--line);background:#fff;color:var(--ink);font-size:12px;font-weight:600;
    padding:6px 9px;border-radius:7px}
  .mini:hover{border-color:var(--ink)}
  .mini.in{color:var(--green)}.mini.in:hover{background:#eef7f1;border-color:var(--green)}
  .mini.out{color:var(--signal-d)}.mini.out:hover{background:#fbeee9;border-color:var(--signal)}
  .mini.x{color:var(--red)}.mini.x:hover{background:#fbeae8;border-color:var(--red)}

  .empty{text-align:center;padding:60px 20px;color:var(--steel)}
  .empty h3{color:var(--ink);margin:0 0 6px}

  /* ---- history ---- */
  .hrow{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:11px 14px;
    display:flex;gap:12px;align-items:center;margin-bottom:8px;box-shadow:var(--sh)}
  .htype{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    padding:3px 8px;border-radius:5px;white-space:nowrap;min-width:74px;text-align:center}
  .htype.in{background:#e7f3ec;color:var(--green)}
  .htype.out{background:#fbeee9;color:var(--signal-d)}
  .htype.adjust{background:#f4eede;color:var(--amber)}
  .htype.transfer{background:#e9edf5;color:#3a5a9b}
  .htype.create{background:#eef0ee;color:var(--steel)}
  .htype.delete{background:#fbeae8;color:var(--red)}
  .hbody{flex:1;min-width:0}
  .hbody b{font-weight:600}
  .hmeta{font-size:12px;color:var(--steel)}
  .hqty{font-family:var(--mono);font-weight:700;font-size:15px;white-space:nowrap}
  .hqty.pos{color:var(--green)}.hqty.neg{color:var(--red)}
  .hdate{font-family:var(--mono);font-size:11px;color:var(--steel);white-space:nowrap;text-align:right}

  /* ---- sites ---- */
  .scard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 16px;
    display:flex;align-items:center;gap:12px;margin-bottom:8px;box-shadow:var(--sh)}
  .scard .nm{font-weight:600;flex:1}
  .scard .ct{font-family:var(--mono);font-size:13px;color:var(--steel)}

  /* ---- modal ---- */
  .scrim{position:fixed;inset:0;background:rgba(20,23,28,.5);z-index:50;display:none;
    align-items:flex-start;justify-content:center;padding:24px;overflow:auto}
  .scrim.on{display:flex}
  .modal{background:var(--card);border-radius:14px;width:100%;max-width:440px;margin:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:pop .15s ease}
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .mhead{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .mhead h3{margin:0;font-size:17px}
  .mhead .x{margin-left:auto;border:0;background:none;font-size:22px;color:var(--steel);line-height:1;padding:0 4px}
  .mbody{padding:20px}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--steel)}
  .fld input,.fld select,.fld textarea{width:100%;padding:11px 12px;border:1px solid var(--line);
    border-radius:9px;font-size:15px;background:#fff}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--signal);border-color:var(--signal)}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{font-size:12px;color:var(--steel);margin-top:5px}
  .bignum{font-family:var(--mono);font-size:18px;font-weight:700;text-align:center;padding:13px}
  .mfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:16px}
  .seg button{flex:1;border:0;background:#fff;padding:11px;font-weight:600;font-size:13px;color:var(--steel);border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--ink);color:#fff}

  /* ---- dashboard ---- */
  .dsum{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .dtile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);
    padding:16px 18px;position:relative;overflow:hidden}
  .dtile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--steel)}
  .dtile.bad::before{background:var(--red)}
  .dtile.warn::before{background:var(--amber)}
  .dtile b{font-family:var(--mono);font-size:34px;font-weight:700;display:block;line-height:1}
  .dtile span{font-size:12px;color:var(--steel);text-transform:uppercase;letter-spacing:.5px}
  .dtile.bad b{color:var(--red)}.dtile.warn b{color:var(--amber)}

  .allok{text-align:center;padding:48px 20px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--r);box-shadow:var(--sh)}
  .allok .big{font-size:42px}
  .allok h3{margin:10px 0 4px;color:var(--green)}
  .allok p{margin:0;color:var(--steel)}

  .dproj{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);
    margin-bottom:12px;overflow:hidden;position:relative}
  .dproj::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--amber)}
  .dproj.hasout::before{background:var(--red)}
  .dproj.ok::before{background:var(--green)}
  .dproj-h{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line2)}
  .dproj.ok .dproj-h{border-bottom:0}
  .dproj-n{font-weight:700;font-size:15px;flex:1}
  .dproj-c{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--red);background:#fbeae8;
    border-radius:20px;padding:3px 10px;white-space:nowrap}
  .dproj-c.warn{color:var(--amber);background:#f6efde}
  .dproj-ok{font-size:13px;color:var(--green);font-weight:600;white-space:nowrap}
  .dalert{display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:1px solid var(--line2)}
  .dalert:first-of-type{border-top:0}
  .da-n{flex:1;min-width:0;font-weight:600;font-size:14px}
  .da-n small{display:block;font-weight:400;color:var(--steel);font-size:11px}
  .da-q{font-family:var(--mono);font-size:13px;color:var(--steel);text-align:right;white-space:nowrap}
  .da-q b{color:var(--ink);font-size:15px}
  .da-chip{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
    padding:3px 8px;border-radius:5px;white-space:nowrap}
  .da-chip.out{background:#fbeae8;color:var(--red)}
  .da-chip.low{background:#f6efde;color:var(--amber)}

  @media(max-width:620px){
    .dsum{grid-template-columns:1fr 1fr}
    .dsum .dtile:first-child{grid-column:1/-1}
    .da-q{display:none}
  }

  /* ---- purchase requests ---- */
  .ocard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);
    padding:13px 16px;display:flex;gap:14px;align-items:center;margin-bottom:10px}
  .ono{font-family:var(--mono);font-weight:700;font-size:15px}
  .oinfo{flex:1;min-width:0}
  .oinfo .om{font-size:12px;color:var(--steel)}
  .ostat{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    padding:3px 9px;border-radius:5px;white-space:nowrap}
  .ostat.pending{background:#f6efde;color:var(--amber)}
  .ostat.approved{background:#e9edf5;color:#3a5a9b}
  .ostat.received{background:#e7f3ec;color:var(--green)}
  .ostat.rejected{background:#fbeae8;color:var(--red)}
  .ototal{font-family:var(--mono);font-weight:700;font-size:14px;white-space:nowrap}

  .pri{display:grid;grid-template-columns:1fr 64px 50px 80px 30px;gap:7px;align-items:center;margin-bottom:8px}
  .pri select,.pri input{padding:9px 8px;border:1px solid var(--line);border-radius:8px;font-size:13px;width:100%;background:#fff}
  .pri .pri-qty,.pri .pri-price{font-family:var(--mono);text-align:right}
  .pri .pri-unit{font-size:12px;color:var(--steel);text-align:center;white-space:nowrap;overflow:hidden}
  .pri .pri-del{border:1px solid var(--line);background:#fff;color:var(--red);border-radius:8px;padding:9px 0;font-size:15px;line-height:1}
  .pri-head{display:grid;grid-template-columns:1fr 64px 50px 80px 30px;gap:7px;font-size:11px;color:var(--steel);
    text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:6px;padding:0 2px}
  .addrow{border:1px dashed var(--line);background:none;color:var(--steel);width:100%;padding:9px;border-radius:8px;font-weight:600;font-size:13px}
  .addrow:hover{border-color:var(--ink);color:var(--ink)}

  /* PR document view */
  .doc{font-size:14px}
  .doc-h{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--ink);padding-bottom:12px;margin-bottom:14px}
  .doc-h .t{font-size:19px;font-weight:700}
  .doc-h .no{font-family:var(--mono);font-size:13px;color:var(--steel);text-align:right}
  .doc-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;margin-bottom:14px;font-size:13px}
  .doc-meta .k{color:var(--steel)}
  .doc table{width:100%;border-collapse:collapse;font-size:13px}
  .doc th{text-align:left;border-bottom:1.5px solid var(--ink);padding:7px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--steel)}
  .doc th.r,.doc td.r{text-align:right}
  .doc td{padding:8px 6px;border-bottom:1px solid var(--line2)}
  .doc td .mono,.doc th.r{font-family:var(--mono)}
  .doc tfoot td{border-bottom:0;border-top:1.5px solid var(--ink);font-weight:700;font-family:var(--mono)}
  .doc-sign{display:flex;gap:14px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line2);font-size:13px}
  .doc-sign .box{flex:1;border:1px solid var(--line);border-radius:8px;padding:10px}
  .doc-sign .box .k{font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:.4px}
  .approve-row{display:flex;gap:8px;align-items:center;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
  .approve-row input{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px}

  #prPrint{display:none}
  @media print{
    @page{margin:16mm}
    body{background:#fff!important;background-image:none!important}
    body>header,body>nav,body>main,body>footer,#scrim,#toast{display:none!important}
    #prPrint{display:block!important;color:#000;font-family:var(--th)}
    #prPrint .doc-h{border-color:#000}
    #prPrint th,#prPrint tfoot td{border-color:#000}
  }

  /* ---- project summary ---- */
  .sumcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);
    margin-bottom:12px;overflow:hidden;position:relative}
  .sumcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--signal)}
  .sum-h{display:flex;align-items:baseline;gap:10px;padding:14px 16px 10px}
  .sum-h .nm{font-weight:700;font-size:16px;flex:1}
  .sum-h .oh{font-family:var(--mono);font-size:13px;color:var(--steel)}
  .sum-h .oh b{font-size:20px;color:var(--ink)}
  .sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line2);
    border-top:1px solid var(--line2);border-bottom:1px solid var(--line2)}
  .sst{background:var(--card);padding:11px 14px}
  .sst b{font-family:var(--mono);font-size:19px;font-weight:700;display:block;line-height:1.1}
  .sst span{font-size:11px;color:var(--steel)}
  .sst.in b{color:var(--green)} .sst.out b{color:var(--red)}
  .sum-items{padding:6px 16px 14px}
  .sum-items .ti{font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:.4px;font-weight:600;padding:8px 0 4px}
  .usebar{display:flex;align-items:center;gap:10px;padding:6px 0}
  .usebar .un{flex:0 0 40%;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .usebar .ub{flex:1;height:8px;background:var(--paper);border-radius:5px;overflow:hidden}
  .usebar .ub i{display:block;height:100%;background:var(--signal);border-radius:5px}
  .usebar .uq{font-family:var(--mono);font-size:13px;font-weight:700;white-space:nowrap}
  .sum-none{padding:0 16px 14px;color:var(--steel);font-size:13px}

  /* ---- settings ---- */
  .setsec{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);
    padding:18px 20px;margin-bottom:16px}
  .setsec h3{margin:0 0 4px;font-size:16px}
  .setsec .desc{color:var(--steel);font-size:13px;margin:0 0 14px}
  .setrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line2)}
  .setrow:first-of-type{border-top:0}
  .setrow .sl{flex:1;min-width:0}
  .setrow .sl b{font-weight:600;font-size:14px}
  .setrow .sl small{display:block;color:var(--steel);font-size:12px}
  .setrow .sv{font-family:var(--mono);font-size:13px;color:var(--steel);white-space:nowrap}
  .setrow input.thr{width:90px;padding:9px 10px;border:1px solid var(--line);border-radius:8px;
    font-family:var(--mono);text-align:right;font-size:14px;background:#fff}
  .setrow input.thr:focus{outline:2px solid var(--signal);border-color:var(--signal)}
  .setrow input.thr.low{border-color:var(--amber);background:#fdf8ec}

  @media(max-width:620px){

    .usebar .un{flex-basis:50%}

  /* ---- count rounds ---- */
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);
    padding:13px 16px;display:flex;gap:14px;align-items:center;margin-bottom:10px}
  .cdate{font-family:var(--mono);text-align:center;line-height:1.05;border-right:1px solid var(--line2);padding-right:14px;min-width:56px}
  .cdate b{font-size:21px;font-weight:700;display:block}

  .modal.wide{max-width:600px}
  .sheet-head{display:grid;grid-template-columns:1fr 60px 76px 58px;gap:8px;padding:8px 2px;

  .sheet-head span:not(:first-child){text-align:right}

  .srow .snm{font-weight:600;font-size:14px;min-width:0}
  .srow .snm small{display:block;color:var(--steel);font-weight:400;font-size:11px}
  .srow .ssys{font-family:var(--mono);text-align:right;color:var(--steel);font-size:14px}
  .srow input{width:100%;padding:8px;border:1px solid var(--line);border-radius:7px;font-family:var(--mono);text-align:right;font-size:14px}
  .srow input:focus{outline:2px solid var(--signal);border-color:var(--signal)}
  .srow .sdiff{font-family:var(--mono);text-align:right;font-weight:700;font-size:13px}
  .srow .sdiff.pos{color:var(--green)}.srow .sdiff.neg{color:var(--red)}.srow .sdiff.zero{color:var(--line)}
  .sheet-search{padding:0 0 10px}
  .sheet-search input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px}
  .sheet-sum{display:flex;gap:16px;padding:10px 2px 0;font-size:13px;color:var(--steel);flex-wrap:wrap}
  .sheet-sum b{font-family:var(--mono);color:var(--ink)}

  /* ---- toast ---- */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:60;pointer-events:none;border-left:3px solid var(--signal)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  footer{max-width:1080px;margin:0 auto;padding:8px 18px 30px;color:var(--steel);font-size:12px;
    display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  footer button{background:none;border:0;color:var(--steel);text-decoration:underline;font-size:12px}
  footer button:hover{color:var(--ink)}
  .savedot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px}

  @media(max-width:620px){
    .pcard{grid-template-columns:1fr}
    .pright{flex-direction:row;align-items:flex-end;justify-content:space-between}
    .total b{font-size:26px}
    .head-stat{order:3;width:100%;justify-content:space-between}

  /* ---- mobile polish ---- */
  header{padding-top:env(safe-area-inset-top)}
  footer{padding-bottom:calc(30px + env(safe-area-inset-bottom))}
  @media(max-width:620px){
    /* 16px on form controls stops iOS auto-zoom on focus */
    input,select,textarea,.fld input,.fld select,.f,.srow input,.pri input,.pri select,.setrow input.thr{font-size:16px}
    main{padding:14px}
    .mini{padding:8px 11px}

  }
</style>

<script>
const KEY='stock:data:v1';
let S={sites:[],products:[],history:[],counts:[],orders:[],prSeq:0,settings:{defaultMin:0}};
const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num=n=>Number(n).toLocaleString('en-US');

/* ---------- storage (local on-device + optional shared cloud via Supabase) ---------- */
const _mem={};
const CKEY='stock:cloud:v1';
const BACKEND=(()=>{
  try{ if(window.storage&&window.storage.get&&window.storage.set)return 'claude'; }catch(e){}
  try{ const k='__st_test__'; window.localStorage.setItem(k,'1'); window.localStorage.removeItem(k); return 'local'; }catch(e){}
  return 'memory';
})();
function writeLocal(v){
  try{
    if(BACKEND==='claude')return window.storage.set(KEY,v);
    if(BACKEND==='local')return window.localStorage.setItem(KEY,v);
    _mem[KEY]=v;
  }catch(e){}
}
function readLocalRaw(){
  try{
    if(BACKEND==='claude')return window.storage.get(KEY).then(r=>r&&r.value?r.value:null);
    if(BACKEND==='local')return Promise.resolve(window.localStorage.getItem(KEY));
    return Promise.resolve(_mem[KEY]||null);
  }catch(e){return Promise.resolve(null);}
}

/* cloud config */
let cloud={url:'',key:'',on:false};
let cloudOk=false,cloudErr='',mySyncStamp='',lastEdit=0,pollT=null;
function loadCloudCfg(){try{const v=window.localStorage.getItem(CKEY);if(v)cloud=Object.assign(cloud,JSON.parse(v));}catch(e){} }
function saveCloudCfg(){try{window.localStorage.setItem(CKEY,JSON.stringify(cloud));}catch(e){_mem[CKEY]=JSON.stringify(cloud);} }
const cloudReady=()=>cloud.on&&/^https:\/\/.+/.test(cloud.url||'')&&(cloud.key||'').length>20;
function sbHead(extra){return Object.assign({'apikey':cloud.key,'Authorization':'Bearer '+cloud.key,'Content-Type':'application/json'},extra||{});}
const sbBase=()=>cloud.url.replace(/\/+$/,'')+'/rest/v1/inventory';
async function cloudLoad(){
  const r=await fetch(sbBase()+'?id=eq.team&select=data,updated_at',{headers:sbHead()});
  if(!r.ok)throw new Error('โหลดไม่สำเร็จ ('+r.status+')');
  const rows=await r.json();
  if(rows.length){mySyncStamp=rows[0].updated_at||'';return rows[0].data;}
  return null;
}
async function cloudStamp(){
  const r=await fetch(sbBase()+'?id=eq.team&select=updated_at',{headers:sbHead()});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const rows=await r.json();return rows.length?(rows[0].updated_at||''):'';
}
async function cloudSave(data){
  const stamp=new Date().toISOString();
  const r=await fetch(sbBase()+'?on_conflict=id',{method:'POST',
    headers:sbHead({'Prefer':'resolution=merge-duplicates,return=minimal'}),
    body:JSON.stringify([{id:'team',data,updated_at:stamp}])});
  if(!r.ok){const t=await r.text();throw new Error('บันทึกไม่สำเร็จ ('+r.status+') '+t.slice(0,80));}
  mySyncStamp=stamp;
}

async function load(){
  if(cloudReady()){
    try{const d=await cloudLoad();cloudOk=true;cloudErr='';return d;}catch(e){cloudOk=false;cloudErr=e.message;}
  }
  try{const raw=await readLocalRaw();return raw?JSON.parse(raw):null;}catch(e){return null;}
}
let saveT,saveErr=false;
function save(){
  lastEdit=Date.now();
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    const v=JSON.stringify(S);
    writeLocal(v); // always keep an offline copy
    if(cloudReady()){
      try{await cloudSave(S);cloudOk=true;cloudErr='';saveErr=false;}catch(e){cloudOk=false;cloudErr=e.message;saveErr=true;}
    }else{ saveErr=(BACKEND==='memory'); }
    updateSaveNote();
  },300);
}
function ensureShape(s){s=s||{};s.sites=s.sites||[];s.products=s.products||[];s.history=s.history||[];s.counts=s.counts||[];s.orders=s.orders||[];if(typeof s.prSeq!=='number')s.prSeq=0;s.settings=s.settings||{defaultMin:0};return s;}

function startPoll(){
  stopPoll();
  if(!cloudReady())return;
  pollT=setInterval(async()=>{
    if($('#scrim').classList.contains('on'))return;     // someone is mid-edit in a dialog
    if(Date.now()-lastEdit<3500)return;                  // we just changed something
    try{
      const st=await cloudStamp();
      if(st&&st!==mySyncStamp){
        const d=await cloudLoad();
        if(d){S=ensureShape(d);renderAll();toast('อัปเดตข้อมูลจากเครื่องอื่นแล้ว');}
      }
      cloudOk=true;cloudErr='';
    }catch(e){cloudOk=false;cloudErr=e.message;}
    updateSaveNote();
  },4000);
}
function stopPoll(){if(pollT)clearInterval(pollT);pollT=null;}

function updateSaveNote(){
  const el=$('#saveNote');if(!el)return;
  if(cloudReady()){
    if(cloudOk)el.innerHTML='<span class="savedot"></span>เชื่อมฐานข้อมูลกลาง — ทุกคนเห็นข้อมูลชุดเดียวกัน';
    else el.innerHTML='<span class="savedot" style="background:var(--red)"></span>เชื่อมฐานข้อมูลไม่ได้'+(cloudErr?' ('+esc(cloudErr)+')':'')+' — กำลังใช้ข้อมูลในเครื่องชั่วคราว';
  }else if(BACKEND==='memory'||saveErr){
    el.innerHTML='<span class="savedot" style="background:var(--red)"></span>ยังไม่ได้บันทึกถาวร — ดาวน์โหลดไฟล์แล้วเปิดในเบราว์เซอร์เพื่อให้บันทึกได้';
  }else el.innerHTML='<span class="savedot"></span>ข้อมูลบันทึกอัตโนมัติในเครื่องนี้';
}

/* ---------- helpers ---------- */
const siteName=id=>{const s=S.sites.find(x=>x.id===id);return s?s.name:'—';};
const total=p=>Object.values(p.stock||{}).reduce((a,b)=>a+(+b||0),0);
function status(p){const t=total(p); if(t<=0)return'out'; if(p.min>0&&t<=p.min)return'low'; return'ok';}
const STAMP={ok:'พร้อม',low:'ใกล้หมด',out:'หมด'};
function logHistory(o){ S.history.unshift({id:uid(),ts:Date.now(),...o}); if(S.history.length>800)S.history.length=800; }

function fmtDate(ts){
  const d=new Date(ts), n=new Date();
  const t=d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  if(d.toDateString()===n.toDateString())return'วันนี้ '+t;
  return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})+' '+t;
}

/* ---------- header / tabs ---------- */
function refreshStats(){
  $('#stItems').textContent=num(S.products.length);
  $('#stUnits').textContent=num(S.products.reduce((a,p)=>a+total(p),0));
  const al=allAlerts();
  $('#stLow').textContent=num(al.length);
  const pill=$('#tabAc');pill.textContent=al.length;pill.className='pill'+(al.length?'':' q');
  $('#tabPc').textContent=S.products.length;
  $('#tabSc').textContent=S.sites.length;
  $('#tabCc').textContent=(S.counts||[]).length;
  const pend=(S.orders||[]).filter(o=>o.status==='pending').length;
  const op=$('#tabOc');op.textContent=pend;op.className='pill'+(pend?'':' q');
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
  ['dashboard','summary','products','counts','orders','history','sites','settings'].forEach(n=>$('#tab-'+n).style.display=(n===t.dataset.tab)?'':'none');
  if(t.dataset.tab==='dashboard')renderDashboard();
  if(t.dataset.tab==='summary')renderSummary();
  if(t.dataset.tab==='settings')renderSettings();
  if(t.dataset.tab==='counts')renderCounts();
  if(t.dataset.tab==='orders')renderOrders();
  if(t.dataset.tab==='history')renderHistory();
  if(t.dataset.tab==='sites')renderSites();
});

/* ---------- products ---------- */
function siteOptions(sel){return S.sites.map(s=>`<option value="${s.id}" ${s.id===sel?'selected':''}>${esc(s.name)}</option>`).join('');}

function renderSiteFilter(){
  const v=$('#fSite').value;
  $('#fSite').innerHTML='<option value="">ทุกไซต์</option>'+siteOptions(v);
  $('#fSite').value=v;
}

function renderAlerts(){
  const low=S.products.filter(p=>status(p)!=='ok');
  if(!low.length){$('#alertWrap').innerHTML='';return;}
  $('#alertWrap').innerHTML=`<div class="alertbox">
    <h4>⚠ ของใกล้หมด / หมดสต็อก (${low.length})</h4>
    ${low.slice(0,6).map(p=>`<div class="row">
      <span>${esc(p.name)} ${p.min?`<span class="cat">(ขั้นต่ำ ${p.min} ${esc(p.unit||'')})</span>`:''}</span>
      <span><b class="${status(p)==='out'?'':''}">${total(p)} ${esc(p.unit||'')}</b>
        <button class="mini in" style="margin-left:8px" onclick="openMove('${p.id}','in')">+ รับเข้า</button></span>
    </div>`).join('')}
    ${low.length>6?`<div class="row" style="justify-content:center;color:var(--steel)">…และอีก ${low.length-6} รายการ</div>`:''}
  </div>`;
}

function renderProducts(){
  renderSiteFilter();
  refreshStats();
  renderAlerts();
  const q=$('#q').value.trim().toLowerCase();
  const fs=$('#fSite').value;
  const onlyLow=$('#fLow').checked;
  let list=S.products.filter(p=>{
    if(q && !(p.name.toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q)))return false;
    if(onlyLow && status(p)==='ok')return false;
    if(fs && !(p.stock&&p.stock[fs]>0))return false;
    return true;
  }).sort((a,b)=>{const r={out:0,low:1,ok:2};return r[status(a)]-r[status(b)]||a.name.localeCompare(b.name,'th');});

  if(!S.products.length){
    $('#plist').innerHTML=`<div class="empty"><h3>ยังไม่มีสินค้า</h3>
      <p>เริ่มต้นด้วยการเพิ่มสินค้าชิ้นแรกเข้าระบบ</p>
      <button class="btn signal" onclick="openProduct()" style="margin-top:8px">+ เพิ่มสินค้า</button></div>`;
    return;
  }
  if(!list.length){$('#plist').innerHTML=`<div class="empty"><h3>ไม่พบรายการ</h3><p>ลองปรับคำค้นหาหรือตัวกรอง</p></div>`;return;}

  $('#plist').innerHTML=list.map(p=>{
    const st=status(p);
    const tags=S.sites.filter(s=>p.stock&&p.stock[s.id]).map(s=>

const ARANK={out:0,low:1};

    .map(p=>{const qty=p.stock[siteId];

/* ---------- project summary (usage) ---------- */
function projectStats(siteId){
  const st={inQ:0,used:0,tin:0,tout:0,adj:0,byProduct:{}};
  S.history.forEach(h=>{
    if(h.type==='in'&&h.siteId===siteId)st.inQ+=h.qty||0;
    else if(h.type==='out'&&h.siteId===siteId){const u=-(h.qty||0);st.used+=u;st.byProduct[h.productName]=(st.byProduct[h.productName]||0)+u;}
    else if(h.type==='adjust'&&h.siteId===siteId)st.adj+=h.qty||0;
    else if(h.type==='transfer'){if(h.siteId===siteId)st.tout+=h.qty||0;if(h.toSiteId===siteId)st.tin+=h.qty||0;}
  });
  return st;
}
const siteOnHand=siteId=>S.products.reduce((a,p)=>a+(p.stock?.[siteId]||0),0);
function unitOf(name){const p=S.products.find(x=>x.name===name);return p?p.unit||'':'';}
function usageList(siteId){ // [{name, qty, unit}] sorted desc, full list
  const st=projectStats(siteId);
  return Object.entries(st.byProduct).filter(([,q])=>q>0)
    .sort((a,b)=>b[1]-a[1]).map(([name,qty])=>({name,qty,unit:unitOf(name)}));
}

function renderSummary(){
  const tot={oh:0,in:0,used:0};

    <div class="dtile"><b style="color:var(--red)">${num(tot.used)}</b><span>เบิกใช้ไปสะสม</span></div>`;
  if(!S.sites.length){$('#sumBoard').innerHTML=`<div class="empty"><h3>ยังไม่มีโครงการ</h3><p>เพิ่มไซต์งานเพื่อดูสรุปการใช้ของ</p></div>`;return;}
  const rows=S.sites.map(s=>({s,st:projectStats(s.id),oh:siteOnHand(s.id),use:usageList(s.id)}))
    .sort((a,b)=>b.st.used-a.st.used);
  $('#sumBoard').innerHTML=rows.map(({s,st,oh,use})=>{

        <span class="oh">คงเหลือ <b>${num(oh)}</b> ชิ้น</span></div>
      <div class="sum-stats">
        <div class="sst in"><b>${num(st.inQ)}</b><span>รับเข้า</span></div>
        <div class="sst out"><b>${num(st.used)}</b><span>เบิกใช้ไป</span></div>
        <div class="sst"><b>${transferNet>0?'+':''}${num(transferNet)}</b><span>โอนสุทธิ</span></div>
        <div class="sst"><b>${st.adj>0?'+':''}${num(st.adj)}</b><span>ปรับยอด</span></div>
      </div>
      <div class="sum-items">
        ${use.length?`<div class="ti">ใช้สินค้าไปแล้ว ${num(use.length)} รายการ</div>${use.map(u=>`
          <div class="usebar"><span class="un">${esc(u.name)}</span>

function setDefaultMin(v){S.settings=S.settings||{};S.settings.defaultMin=Math.max(0,+v||0);save();toast('บันทึกค่าเริ่มต้นแล้ว');}

function cloudStatusBox(state,msg){
  const el=$('#cloudStatus');if(!el)return;
  const map={ok:['#e7f3ec','var(--green)','✓ '],err:['#fbeae8','var(--red)','✕ '],wait:['#f6efde','var(--amber)','… '],off:['#eef0ee','var(--steel)','']};
  const c=map[state]||map.off;
  el.innerHTML=`<div style="background:${c[0]};color:${c[1]};border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600">${c[2]}${esc(msg)}</div>`;
}
async function testCloud(){
  const url=$('#cbUrl').value.trim(),key=$('#cbKey').value.trim();
  if(!/^https:\/\/.+/.test(url)||key.length<20)return cloudStatusBox('err','กรอก URL (ขึ้นต้น https://) และ key ให้ครบ');
  cloudStatusBox('wait','กำลังทดสอบ…');
  try{
    const r=await fetch(url.replace(/\/+$/,'')+'/rest/v1/inventory?select=id&limit=1',
      {headers:{'apikey':key,'Authorization':'Bearer '+key}});
    if(r.ok)cloudStatusBox('ok','เชื่อมต่อได้ พร้อมใช้งาน — กดปุ่มเชื่อมต่อเพื่อเริ่มใช้ร่วมกัน');
    else if(r.status===404||r.status===400)cloudStatusBox('err','เชื่อมเซิร์ฟเวอร์ได้ แต่ยังไม่พบตาราง inventory — ไปวางคำสั่งตั้งตารางใน SQL Editor ก่อน');
    else cloudStatusBox('err','เชื่อมไม่ได้ (รหัส '+r.status+') ตรวจ URL/key อีกครั้ง');
  }catch(e){cloudStatusBox('err','เชื่อมไม่ได้ ตรวจอินเทอร์เน็ตหรือ URL ('+esc(e.message)+')');}
}
async function connectCloud(){
  const url=$('#cbUrl').value.trim(),key=$('#cbKey').value.trim();
  if(!/^https:\/\/.+/.test(url)||key.length<20)return cloudStatusBox('err','กรอก URL และ key ให้ครบก่อน');
  cloud={url,key,on:true};saveCloudCfg();
  cloudStatusBox('wait','กำลังเชื่อมและซิงค์ข้อมูล…');
  try{
    const remote=await cloudLoad();
    if(remote&&((remote.products||[]).length||(remote.sites||[]).length)){
      // มีข้อมูลกลางอยู่แล้ว → ใช้ของกลาง
      S=ensureShape(remote);
      cloudStatusBox('ok','เชื่อมแล้ว ดึงข้อมูลกลางมาใช้เรียบร้อย');
      toast('เชื่อมฐานข้อมูลกลางแล้ว');
    }else{
      // ยังไม่มีข้อมูลกลาง → ส่งข้อมูลในเครื่องขึ้นไปตั้งต้น
      await cloudSave(S);
      cloudStatusBox('ok','เชื่อมแล้ว และอัปข้อมูลในเครื่องนี้ขึ้นเป็นชุดกลางเรียบร้อย');
      toast('ตั้งค่าฐานข้อมูลกลางแล้ว');
    }
    cloudOk=true;cloudErr='';startPoll();renderAll();renderSettings();updateSaveNote();
  }catch(e){
    cloud.on=false;saveCloudCfg();cloudOk=false;cloudErr=e.message;
    cloudStatusBox('err','เชื่อมไม่สำเร็จ: '+esc(e.message));renderSettings();
  }
}
function disconnectCloud(){
  stopPoll();cloud.on=false;saveCloudCfg();cloudOk=false;
  toast('ตัดการเชื่อมต่อแล้ว — กลับมาใช้ข้อมูลในเครื่อง');
  renderSettings();updateSaveNote();
}

  setTimeout(()=>$('#pn').focus(),50);
}
function saveProduct(id){
  const name=$('#pn').value.trim();
  if(!name)return toast('กรุณากรอกชื่อสินค้า');
  const data={name,sku:$('#psku').value.trim(),unit:$('#pu').value.trim(),
    cat:$('#pc').value.trim(),min:+($('#pmin').value||0)};
  if(id){
    const p=S.products.find(x=>x.id===id);Object.assign(p,data);
    logHistory({type:'create',sub:'edit',productName:name,note:'แก้ไขข้อมูลสินค้า'});
    toast('บันทึกแล้ว');
  }else{
    const stock={}; const st=$('#pst')?.value, q0=+($('#pq0')?.value||0);
    if(st&&q0)stock[st]=q0;
    S.products.push({id:uid(),...data,stock});
    logHistory({type:'create',sub:'add',productName:name,note:q0?`ยอดเริ่มต้น ${q0} ที่ ${siteName(st)}`:'เพิ่มสินค้าใหม่',qty:q0,siteId:st});
    toast('เพิ่มสินค้าแล้ว');
  }
  save();closeM();renderProducts();renderDashboard();
}
function delProduct(id){
  const p=S.products.find(x=>x.id===id);
  modal(`<div class="mhead"><h3>ลบสินค้า</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody">ต้องการลบ <b>${esc(p.name)}</b> ออกจากระบบใช่ไหม? ประวัติที่ผ่านมาจะยังคงอยู่</div>
    <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
    <button class="btn signal" style="background:var(--red);border-color:var(--red)" onclick="doDel('${id}')">ลบสินค้า</button></div>`);
}
function doDel(id){
  const p=S.products.find(x=>x.id===id);
  logHistory({type:'delete',productName:p.name,note:'ลบสินค้าออกจากระบบ'});
  S.products=S.products.filter(x=>x.id!==id);
  save();closeM();renderProducts();renderDashboard();toast('ลบแล้ว');
}

/* ---------- stock move modal ---------- */
const MOVE={in:{t:'รับเข้า',c:'in'},out:{t:'เบิกออก',c:'out'},adjust:{t:'นับ / ปรับยอด',c:'adjust'},transfer:{t:'โอนย้ายระหว่างไซต์',c:'transfer'}};
function openMove(pid,type,preSite){
  const p=S.products.find(x=>x.id===pid);window._mp=p;
  const segs=['in','out','adjust',...(S.sites.length>1?['transfer']:[])];
  modal(`
    <div class="mhead"><h3>${esc(p.name)}</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody">
      <div class="seg" id="seg">${segs.map(k=>`<button class="${k===type?'on':''}" onclick="openMove('${pid}','${k}','${preSite||''}')">${MOVE[k].t.split(' ')[0]}</button>`).join('')}</div>
      <div id="moveForm"></div>
    </div>
    <div class="mfoot">
      <button class="btn ghost" onclick="closeM()">ยกเลิก</button>
      <button class="btn signal" onclick="doMove('${pid}','${type}')">ยืนยัน${MOVE[type].t.split(' ')[0]}</button>
    </div>`);
  moveForm(p,type,preSite);
}
function moveForm(p,type,preSite){
  const cur=sid=>num(p.stock?.[sid]||0)+' '+(p.unit||'');
  const def=(preSite&&S.sites.some(s=>s.id===preSite))?preSite:S.sites[0]?.id;
  let html='';
  if(type==='transfer'){
    const toDef=(S.sites.find(s=>s.id!==def)||{}).id;
    html=`<div class="fld"><label>จากไซต์</label><select id="mFrom" onchange="document.getElementById('mFromCur').textContent=fromCur()">${siteOptions(def)}</select>
      <div class="hint">คงเหลือ: <span id="mFromCur">${cur(def)}</span></div></div>
      <div class="fld"><label>ไปยังไซต์</label><select id="mTo">${siteOptions(toDef)}</select></div>
      <div class="fld"><label>จำนวนที่โอน</label><input id="mQty" type="number" min="1" class="bignum" value="1"></div>`;
  }else if(type==='adjust'){
    html=`<div class="fld"><label>ไซต์</label><select id="mSite" onchange="document.getElementById('mCur').textContent=siteCur()">${siteOptions(def)}</select>
      <div class="hint">ระบบบันทึกไว้: <span id="mCur">${cur(def)}</span></div></div>
      <div class="fld"><label>ยอดที่นับได้จริง</label><input id="mQty" type="number" min="0" class="bignum" value="${p.stock?.[def]||0}">
      <div class="hint">ระบบจะปรับยอดให้ตรงกับที่นับได้ และบันทึกส่วนต่าง</div></div>`;
  }else{
    const verb=type==='in'?'รับเข้า':'เบิกออก';
    html=`<div class="fld"><label>ไซต์</label><select id="mSite" onchange="document.getElementById('mCur').textContent=siteCur()">${siteOptions(def)}</select>
      <div class="hint">คงเหลือ: <span id="mCur">${cur(def)}</span></div></div>
      <div class="fld"><label>จำนวนที่${verb}</label><input id="mQty" type="number" min="1" class="bignum" value="1"></div>`;
  }
  html+=`<div class="fld"><label>หมายเหตุ</label><input id="mNote" placeholder="เช่น เลขที่บิล / ผู้เบิก (ไม่บังคับ)"></div>`;
  $('#moveForm').innerHTML=html;
}
function siteCur(){const p=window._mp;const sid=$('#mSite').value;return num(p.stock?.[sid]||0)+' '+(p.unit||'');}
function fromCur(){const p=window._mp;const sid=$('#mFrom').value;return num(p.stock?.[sid]||0)+' '+(p.unit||'');}
function doMove(pid,type){
  const p=S.products.find(x=>x.id===pid);window._mp=p;
  const note=$('#mNote').value.trim();
  p.stock=p.stock||{};
  if(type==='transfer'){
    const from=$('#mFrom').value,to=$('#mTo').value,qty=+$('#mQty').value;
    if(from===to)return toast('เลือกไซต์ปลายทางที่ต่างกัน');
    if(qty<=0)return toast('ระบุจำนวน');
    if((p.stock[from]||0)<qty)return toast('ของในไซต์ต้นทางไม่พอ');
    p.stock[from]=(p.stock[from]||0)-qty; p.stock[to]=(p.stock[to]||0)+qty;
    logHistory({type:'transfer',productName:p.name,qty,siteId:from,toSiteId:to,note});
    toast(`โอน ${qty} จาก ${siteName(from)} → ${siteName(to)}`);
  }else if(type==='adjust'){
    const sid=$('#mSite').value,counted=+$('#mQty').value;
    const before=p.stock[sid]||0,diff=counted-before;
    p.stock[sid]=counted;
    logHistory({type:'adjust',productName:p.name,qty:diff,siteId:sid,note:note||`นับได้ ${counted} (เดิม ${before})`});
    toast(diff===0?'ยอดตรง ไม่มีส่วนต่าง':`ปรับยอดแล้ว (${diff>0?'+':''}${diff})`);
  }else{
    const sid=$('#mSite').value,qty=+$('#mQty').value;
    if(qty<=0)return toast('ระบุจำนวน');
    if(type==='out'&&(p.stock[sid]||0)<qty)return toast('ของในไซต์นี้ไม่พอเบิก');
    p.stock[sid]=(p.stock[sid]||0)+(type==='in'?qty:-qty);
    logHistory({type,productName:p.name,qty:type==='in'?qty:-qty,siteId:sid,note});
    toast(type==='in'?`รับเข้า ${qty} ที่ ${siteName(sid)}`:`เบิกออก ${qty} ที่ ${siteName(sid)}`);
  }
  save();closeM();renderProducts();renderDashboard();
}

/* ---------- history ---------- */
function renderHistory(){
  const f=$('#hFilter').value;
  let list=S.history.filter(h=>!f||(f==='create'?['create','delete'].includes(h.type):h.type===f));
  if(!list.length){$('#hlist').innerHTML=`<div class="empty"><h3>ยังไม่มีประวัติ</h3><p>การรับเข้า เบิกออก ปรับยอด และโอนย้าย จะถูกบันทึกที่นี่</p></div>`;return;}
  const lbl={in:'รับเข้า',out:'เบิกออก',adjust:'ปรับยอด',transfer:'โอนย้าย',create:'จัดการ',delete:'ลบ'};
  $('#hlist').innerHTML=list.map(h=>{
    const q=h.qty||0;
    let where=h.siteId?esc(siteName(h.siteId)):'';
    if(h.type==='transfer')where=`${esc(siteName(h.siteId))} → ${esc(siteName(h.toSiteId))}`;
    return `<div class="hrow">
      <span class="htype ${h.type}">${lbl[h.type]}</span>
      <div class="hbody"><b>${esc(h.productName||'')}</b>
        <div class="hmeta">${where}${h.note?(where?' · ':'')+esc(h.note):''}</div></div>
      ${q?`<span class="hqty ${q>0?'pos':'neg'}">${q>0?'+':''}${num(q)}</span>`:''}
      <span class="hdate">${fmtDate(h.ts)}</span>
    </div>`;
  }).join('');
}
$('#hFilter').addEventListener('change',renderHistory);

/* ---------- sites ---------- */
function renderSites(){
  if(!S.sites.length){$('#slist').innerHTML=`<div class="empty"><h3>ยังไม่มีไซต์งาน</h3><button class="btn signal" onclick="openSite()" style="margin-top:8px">+ เพิ่มไซต์งาน</button></div>`;return;}
  $('#slist').innerHTML=S.sites.map(s=>{
    const units=S.products.reduce((a,p)=>a+(p.stock?.[s.id]||0),0);
    const items=S.products.filter(p=>p.stock?.[s.id]).length;
    return `<div class="scard">
      <span class="nm">📍 ${esc(s.name)}</span>

    </div>`;

}
function openSite(id){
  const s=id?S.sites.find(x=>x.id===id):null;
  modal(`<div class="mhead"><h3>${s?'เปลี่ยนชื่อไซต์':'เพิ่มไซต์งาน'}</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody"><div class="fld"><label>ชื่อไซต์งาน *</label><input id="sn" value="${esc(s?.name||'')}" placeholder="เช่น ไซต์ A - ลาดพร้าว"></div></div>
    <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
    <button class="btn signal" onclick="saveSite('${id||''}')">${s?'บันทึก':'เพิ่มไซต์'}</button></div>`);
  setTimeout(()=>$('#sn').focus(),50);
}
function saveSite(id){
  const name=$('#sn').value.trim();if(!name)return toast('กรุณากรอกชื่อไซต์');
  if(id)S.sites.find(x=>x.id===id).name=name;
  else S.sites.push({id:uid(),name});
  save();closeM();renderSites();renderProducts();renderDashboard();toast('บันทึกแล้ว');
}
function delSite(id){
  const used=S.products.reduce((a,p)=>a+(p.stock?.[id]||0),0);
  modal(`<div class="mhead"><h3>ลบไซต์งาน</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody">ลบ <b>${esc(siteName(id))}</b> ?
    ${used?`<div class="hint" style="color:var(--red);margin-top:8px">⚠ ไซต์นี้ยังมีของอยู่ ${num(used)} ชิ้น — ควรโอนย้ายออกก่อนลบ</div>`:''}</div>
    <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
    <button class="btn signal" style="background:var(--red);border-color:var(--red)" onclick="doDelSite('${id}')">ลบไซต์</button></div>`);
}
function doDelSite(id){
  S.products.forEach(p=>{if(p.stock)delete p.stock[id];});
  S.sites=S.sites.filter(x=>x.id!==id);
  save();closeM();renderSites();renderProducts();renderDashboard();toast('ลบไซต์แล้ว');
}

/* ---------- count rounds ---------- */
const CSTAT={draft:'กำลังนับ',done:'บันทึกแล้ว',applied:'ปรับยอดแล้ว'};
function countSystem(r,pid){ // system qty to compare against
  if(r.snap&&pid in r.snap)return r.snap[pid];
  const p=S.products.find(x=>x.id===pid);return p?.stock?.[r.siteId]||0;
}
function countSummary(r){
  let n=0,diff=0;
  for(const pid in r.items){n++;diff+=r.items[pid]-countSystem(r,pid);}
  return{n,diff};
}
function renderCountFilter(){
  const v=$('#cSite').value;
  $('#cSite').innerHTML='<option value="">ทุกโครงการ</option>'+siteOptions(v);
  $('#cSite').value=v;
}
function renderCounts(){
  renderCountFilter();
  const fs=$('#cSite').value;
  let list=(S.counts||[]).filter(r=>!fs||r.siteId===fs)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.ts-a.ts);
  if(!(S.counts||[]).length){
    $('#clist').innerHTML=`<div class="empty"><h3>ยังไม่มีรอบนับ</h3>
      <p>เริ่มรอบนับเพื่อบันทึกการตรวจนับจริงของแต่ละโครงการ แยกเป็นวัน ๆ และเทียบกับยอดในระบบ</p>
      <button class="btn signal" onclick="openNewCount()" style="margin-top:8px">+ เริ่มรอบนับใหม่</button></div>`;
    return;
  }
  if(!list.length){$('#clist').innerHTML=`<div class="empty"><h3>ไม่มีรอบนับของโครงการนี้</h3></div>`;return;}
  $('#clist').innerHTML=list.map(r=>{
    const {n,diff}=countSummary(r);
    const d=new Date(r.date+'T00:00:00');
    const dc=diff>0?'pos':diff<0?'neg':'zero';
    return `<div class="ccard">
      <div class="cdate"><b>${d.getDate()}</b><span>${d.toLocaleDateString('th-TH',{month:'short'})}</span></div>
      <div class="cinfo">
        <div class="cp">📍 ${esc(siteName(r.siteId))}</div>
        <div class="cm">นับแล้ว ${num(n)} รายการ${r.note?' · '+esc(r.note):''}</div>
      </div>
      <span class="cdiff ${dc}">${diff>0?'+':''}${num(diff)}</span>
      <span class="cstat ${r.status}">${CSTAT[r.status]}</span>
      <button class="mini" onclick="openCountSheet('${r.id}')">${r.status==='draft'?'นับต่อ':'ดู'}</button>
      <button class="mini x" onclick="delCount('${r.id}')">ลบ</button>
    </div>`;
  }).join('');
}
$('#cSite').addEventListener('change',renderCounts);

function openNewCount(){
  if(!S.sites.length)return toast('เพิ่มไซต์งานก่อนเริ่มนับ');
  const today=new Date().toISOString().slice(0,10);
  modal(`<div class="mhead"><h3>เริ่มรอบนับใหม่</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody">
      <div class="fld"><label>โครงการ / ไซต์งาน *</label><select id="ncSite">${siteOptions(S.sites[0]?.id)}</select></div>
      <div class="fld"><label>วันที่นับ</label><input id="ncDate" type="date" value="${today}"></div>
      <div class="fld"><label>หมายเหตุ</label><input id="ncNote" placeholder="เช่น นับสิ้นเดือน / ผู้ตรวจนับ (ไม่บังคับ)"></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
    <button class="btn signal" onclick="createCount()">เริ่มนับ</button></div>`);
}
function createCount(){
  const r={id:uid(),ts:Date.now(),date:$('#ncDate').value||new Date().toISOString().slice(0,10),
    siteId:$('#ncSite').value,note:$('#ncNote').value.trim(),status:'draft',items:{},snap:{}};
  S.counts.unshift(r);save();closeM();openCountSheet(r.id);
}
let _csearch='';
function openCountSheet(rid){
  const r=S.counts.find(x=>x.id===rid);if(!r)return;
  _csearch='';
  const editable=r.status==='draft';
  modal(`<div class="mhead"><h3>นับสต็อก · ${esc(siteName(r.siteId))}</h3><button class="x" onclick="closeCountSheet('${rid}')">×</button></div>
    <div class="mbody" style="max-height:62vh;overflow:auto">
      <div class="cm" style="color:var(--steel);font-size:13px;margin-bottom:10px">
        วันที่ ${new Date(r.date+'T00:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}
        · <span class="cstat ${r.status}" style="display:inline-block">${CSTAT[r.status]}</span>
      </div>
      ${editable?`<div class="sheet-search"><input id="csearch" placeholder="ค้นหาสินค้าในรายการนับ…" oninput="_csearch=this.value;drawSheet('${rid}')"></div>`:''}
      <div class="sheet-head"><span>สินค้า</span><span>ระบบ</span><span>นับได้</span><span>ส่วนต่าง</span></div>
      <div id="sheetRows"></div>
      <div class="sheet-sum" id="sheetSum"></div>
    </div>
    <div class="mfoot" id="sheetFoot"></div>`,true);
  drawSheet(rid);
  drawSheetFoot(rid,editable);
}
function drawSheet(rid){
  const r=S.counts.find(x=>x.id===rid);
  const q=(_csearch||'').trim().toLowerCase();
  const prods=S.products.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q))
    .sort((a,b)=>a.name.localeCompare(b.name,'th'));
  const editable=r.status==='draft';
  if(!prods.length){$('#sheetRows').innerHTML=`<div class="empty" style="padding:24px"><p>ไม่พบสินค้า</p></div>`;}
  else $('#sheetRows').innerHTML=prods.map(p=>{
    const sys=countSystem(r,p.id);
    const counted=(p.id in r.items)?r.items[p.id]:'';
    const diff=counted===''?null:counted-sys;
    const dc=diff===null?'zero':diff>0?'pos':diff<0?'neg':'zero';
    return `<div class="srow">
      <div class="snm">${esc(p.name)}<small>${p.sku?esc(p.sku)+' · ':''}${esc(p.unit||'ชิ้น')}</small></div>
      <div class="ssys">${num(sys)}</div>
      ${editable
        ? `<input type="number" min="0" inputmode="numeric" data-pid="${p.id}" value="${counted}" placeholder="–" oninput="onCount('${rid}','${p.id}',this.value)">`
        : `<div class="ssys" style="color:var(--ink);font-weight:600">${counted===''?'–':num(counted)}</div>`}
      <div class="sdiff ${dc}">${diff===null?'·':(diff>0?'+':'')+num(diff)}</div>
    </div>`;
  }).join('');
  drawSheetSum(rid);
}
function onCount(rid,pid,val){
  const r=S.counts.find(x=>x.id===rid);
  if(val.trim()==='')delete r.items[pid];else r.items[pid]=+val;
  save();
  // update just the diff cell + summary without full redraw (keep focus)
  const row=document.querySelector(`[data-pid="${pid}"]`)?.closest('.srow');
  if(row){const sys=countSystem(r,pid);const c=(pid in r.items)?r.items[pid]:'';const diff=c===''?null:c-sys;
    const cell=row.querySelector('.sdiff');cell.className='sdiff '+(diff===null?'zero':diff>0?'pos':diff<0?'neg':'zero');
    cell.textContent=diff===null?'·':(diff>0?'+':'')+num(diff);}
  drawSheetSum(rid);
}
function drawSheetSum(rid){
  const r=S.counts.find(x=>x.id===rid);const {n,diff}=countSummary(r);
  $('#sheetSum').innerHTML=`<span>นับแล้ว <b>${num(n)}</b>/${num(S.products.length)} รายการ</span>
    <span>ส่วนต่างรวม <b style="color:${diff>0?'var(--green)':diff<0?'var(--red)':'var(--ink)'}">${diff>0?'+':''}${num(diff)}</b></span>`;
}
function drawSheetFoot(rid,editable){
  if(editable){
    $('#sheetFoot').innerHTML=`<button class="btn ghost" onclick="closeCountSheet('${rid}')">บันทึกร่าง</button>
      <button class="btn" onclick="finishCount('${rid}',false)">บันทึกผล</button>
      <button class="btn signal" onclick="finishCount('${rid}',true)">บันทึกและปรับยอด</button>`;
  }else{
    const r=S.counts.find(x=>x.id===rid);
    $('#sheetFoot').innerHTML=`${r.status==='done'?`<button class="btn signal" onclick="applyDone('${rid}')">ปรับยอดตามรอบนี้</button>`:''}
      <button class="btn ghost" onclick="closeM()">ปิด</button>`;
  }
}
function closeCountSheet(rid){save();closeM();renderCounts();toast('บันทึกร่างแล้ว');}
function snapshot(r){r.snap={};for(const pid in r.items){const p=S.products.find(x=>x.id===pid);r.snap[pid]=p?.stock?.[r.siteId]||0;}}
function finishCount(rid,apply){
  const r=S.counts.find(x=>x.id===rid);
  if(!Object.keys(r.items).length)return toast('ยังไม่ได้นับสินค้าใด');
  snapshot(r);
  if(apply){applyToStock(r);r.status='applied';toast('บันทึกและปรับยอดเรียบร้อย');}
  else{r.status='done';toast('บันทึกผลการนับแล้ว');}
  save();closeM();renderCounts();renderProducts();renderDashboard();
}
function applyDone(rid){
  const r=S.counts.find(x=>x.id===rid);
  applyToStock(r);r.status='applied';save();closeM();renderCounts();renderProducts();renderDashboard();toast('ปรับยอดตามรอบนับแล้ว');
}
function applyToStock(r){
  for(const pid in r.items){
    const p=S.products.find(x=>x.id===pid);if(!p)continue;
    const before=p.stock?.[r.siteId]||0,counted=r.items[pid],diff=counted-before;
    if(diff!==0){p.stock=p.stock||{};p.stock[r.siteId]=counted;
      logHistory({type:'adjust',productName:p.name,qty:diff,siteId:r.siteId,note:`รอบนับ ${r.date}`});}
  }
}
function delCount(rid){
  const r=S.counts.find(x=>x.id===rid);
  modal(`<div class="mhead"><h3>ลบรอบนับ</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody">ลบรอบนับของ <b>${esc(siteName(r.siteId))}</b> วันที่ ${new Date(r.date+'T00:00:00').toLocaleDateString('th-TH')} ?
    ${r.status==='applied'?'<div class="hint" style="margin-top:8px">ยอดสต็อกที่ปรับไปแล้วจะไม่ถูกย้อนกลับ</div>':''}</div>
    <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
    <button class="btn signal" style="background:var(--red);border-color:var(--red)" onclick="doDelCount('${rid}')">ลบรอบนับ</button></div>`);
}
function doDelCount(rid){S.counts=S.counts.filter(x=>x.id!==rid);save();closeM();renderCounts();toast('ลบรอบนับแล้ว');}

/* ---------- purchase requests (PR) ---------- */
const OSTAT={pending:'รออนุมัติ',approved:'อนุมัติแล้ว',received:'รับของแล้ว',rejected:'ไม่อนุมัติ'};
function nextPRNo(){S.prSeq=(S.prSeq||0)+1;return 'PR-'+String(S.prSeq).padStart(4,'0');}
const prTotal=o=>o.items.reduce((a,it)=>a+(+it.price||0)*(+it.qty||0),0);
const prHasPrice=o=>o.items.some(it=>+it.price>0);

function renderOrderFilter(){
  const v=$('#oSite').value;
  $('#oSite').innerHTML='<option value="">ทุกโครงการ</option>'+siteOptions(v);
  $('#oSite').value=v;
}
function renderOrders(){
  renderOrderFilter();refreshStats();
  const fst=$('#oStatus').value,fsi=$('#oSite').value;
  let list=(S.orders||[]).filter(o=>(!fst||o.status===fst)&&(!fsi||o.siteId===fsi))
    .sort((a,b)=>b.ts-a.ts);
  if(!(S.orders||[]).length){
    $('#olist').innerHTML=`<div class="empty"><h3>ยังไม่มีใบขอซื้อ</h3>
      <p>สร้างใบขออนุญาตสั่งซื้อจากของที่ใกล้หมด เพื่อส่งขออนุมัติ และรับของเข้าสต็อกเมื่อของมาถึง</p>
      <button class="btn signal" onclick="openNewPR()" style="margin-top:8px">+ สร้างใบขอซื้อ</button></div>`;return;
  }
  if(!list.length){$('#olist').innerHTML=`<div class="empty"><h3>ไม่พบใบขอซื้อ</h3></div>`;return;}
  $('#olist').innerHTML=list.map(o=>`<div class="ocard">
    <span class="ono">${o.no}</span>
    <div class="oinfo">
      <div><b>📍 ${esc(siteName(o.siteId))}</b> <span class="om">· ${num(o.items.length)} รายการ${o.requester?' · ผู้ขอ '+esc(o.requester):''}</span></div>
      <div class="om">${new Date(o.ts).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})}</div>
    </div>
    ${prHasPrice(o)?`<span class="ototal">฿${num(prTotal(o))}</span>`:''}
    <span class="ostat ${o.status}">${OSTAT[o.status]}</span>
    <button class="mini" onclick="openPR('${o.id}')">เปิด</button>
    <button class="mini x" onclick="delPR('${o.id}')">ลบ</button>
  </div>`).join('');
}
$('#oStatus').addEventListener('change',renderOrders);
$('#oSite').addEventListener('change',renderOrders);

/* ----- create / edit draft ----- */
let _pr=null;
function openNewPR(siteId){
  if(!S.sites.length)return toast('เพิ่มไซต์งานก่อน');
  if(!S.products.length)return toast('เพิ่มสินค้าก่อน');
  const site=(siteId&&S.sites.some(s=>s.id===siteId))?siteId:S.sites[0].id;
  let items=[];
  if(siteId){items=siteAlerts(site).map(({p,qty})=>({productId:p.id,qty:Math.max(2*p.min-qty,1)||1,price:''}));}
  if(!items.length)items=[{productId:S.products[0].id,qty:1,price:''}];
  _pr={siteId:site,requester:'',note:'',items};
  modal(`<div class="mhead"><h3>สร้างใบขอซื้อ</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody" style="max-height:64vh;overflow:auto">
      <div class="frow">
        <div class="fld"><label>โครงการ / ไซต์งาน *</label><select id="prSite">${siteOptions(site)}</select></div>
        <div class="fld"><label>ผู้ขอซื้อ</label><input id="prReq" placeholder="ชื่อผู้ขอ"></div>
      </div>
      <label style="font-size:13px;font-weight:600;color:var(--steel);display:block;margin-bottom:8px">รายการสินค้า</label>
      <div class="pri-head"><span>สินค้า</span><span style="text-align:right">จำนวน</span><span style="text-align:center">หน่วย</span><span style="text-align:right">ราคา/หน่วย</span><span></span></div>
      <div id="prItems"></div>
      <button class="addrow" onclick="addPRItem()">+ เพิ่มรายการ</button>
      <div class="fld" style="margin-top:14px"><label>หมายเหตุ / เหตุผลขอซื้อ</label><input id="prNote" placeholder="เช่น ใช้งานโครงการ X (ไม่บังคับ)"></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
    <button class="btn signal" onclick="savePR()">บันทึกใบขอซื้อ</button></div>`,true);
  drawPRItems();
}
function prodOptions(sel){return S.products.map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${esc(p.name)}${p.sku?' ('+esc(p.sku)+')':''}</option>`).join('');}
function drawPRItems(){
  $('#prItems').innerHTML=_pr.items.map((it,i)=>{
    const p=S.products.find(x=>x.id===it.productId);
    return `<div class="pri">
      <select class="pri-prod" onchange="collectPR();drawPRItems()">${prodOptions(it.productId)}</select>
      <input class="pri-qty" type="number" min="1" inputmode="numeric" value="${it.qty}">
      <span class="pri-unit">${esc(p?.unit||'')}</span>
      <input class="pri-price" type="number" min="0" inputmode="decimal" placeholder="–" value="${it.price}">
      <button class="pri-del" onclick="removePRItem(${i})">×</button>
    </div>`;
  }).join('');
}
function collectPR(){
  if($('#prSite'))_pr.siteId=$('#prSite').value;
  if($('#prReq'))_pr.requester=$('#prReq').value;
  if($('#prNote'))_pr.note=$('#prNote').value;
  document.querySelectorAll('#prItems .pri').forEach((row,i)=>{
    if(!_pr.items[i])return;
    _pr.items[i].productId=row.querySelector('.pri-prod').value;
    _pr.items[i].qty=+row.querySelector('.pri-qty').value||0;
    _pr.items[i].price=row.querySelector('.pri-price').value;
  });
}
function addPRItem(){collectPR();_pr.items.push({productId:S.products[0].id,qty:1,price:''});drawPRItems();}
function removePRItem(i){collectPR();_pr.items.splice(i,1);if(!_pr.items.length)_pr.items.push({productId:S.products[0].id,qty:1,price:''});drawPRItems();}
function savePR(){
  collectPR();
  const items=_pr.items.filter(it=>it.qty>0);
  if(!items.length)return toast('ใส่รายการอย่างน้อย 1 รายการ');
  const o={id:uid(),no:nextPRNo(),ts:Date.now(),date:new Date().toISOString().slice(0,10),
    siteId:_pr.siteId,requester:_pr.requester.trim(),note:_pr.note.trim(),status:'pending',
    items:items.map(it=>{const p=S.products.find(x=>x.id===it.productId);
      return{productId:it.productId,name:p?p.name:'',sku:p?.sku||'',unit:p?p.unit:'',qty:+it.qty,price:+it.price||0};})};
  S.orders.unshift(o);save();closeM();renderOrders();toast('สร้างใบขอซื้อ '+o.no+' แล้ว');
}

/* ----- view / approve / receive ----- */
function prDocHTML(o){
  const hasP=prHasPrice(o);
  return `<div class="doc">
    <div class="doc-h"><div><div class="t">ใบขออนุญาตสั่งซื้อสินค้า</div><div class="om" style="color:var(--steel);font-size:12px">Purchase Request</div></div>
      <div class="no">${o.no}<br>${new Date(o.ts).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}</div></div>
    <div class="doc-meta">
      <div><span class="k">โครงการ:</span> <b>${esc(siteName(o.siteId))}</b></div>
      <div><span class="k">ผู้ขอซื้อ:</span> ${esc(o.requester||'-')}</div>
      <div style="grid-column:1/-1"><span class="k">เหตุผล:</span> ${esc(o.note||'-')}</div>
    </div>
    <table><thead><tr><th style="width:28px">#</th><th>รายการ</th><th class="r">จำนวน</th><th>หน่วย</th>${hasP?'<th class="r">ราคา/หน่วย</th><th class="r">รวม</th>':''}</tr></thead>
    <tbody>${o.items.map((it,i)=>`<tr><td class="mono">${i+1}</td><td>${esc(it.name||'(ลบแล้ว)')}${it.sku?` <span class="om" style="color:var(--steel)">${esc(it.sku)}</span>`:''}</td>
      <td class="r mono">${num(it.qty)}</td><td>${esc(it.unit||'')}</td>
      ${hasP?`<td class="r mono">${it.price?num(it.price):'-'}</td><td class="r mono">${it.price?num(it.price*it.qty):'-'}</td>`:''}</tr>`).join('')}</tbody>
    ${hasP?`<tfoot><tr><td colspan="${4}" class="r">รวมทั้งสิ้น</td><td></td><td class="r">฿${num(prTotal(o))}</td></tr></tfoot>`:''}
    </table>
    <div class="doc-sign">
      <div class="box"><div class="k">ผู้ขอซื้อ</div><div style="margin-top:18px">${esc(o.requester||'')}</div></div>
      <div class="box"><div class="k">ผู้อนุมัติ</div><div style="margin-top:18px">${esc(o.approver||'')}${o.decidedTs?`<br><span class="om" style="color:var(--steel);font-size:11px">${OSTAT[o.status]} · ${new Date(o.decidedTs).toLocaleDateString('th-TH')}</span>`:''}</div></div>
    </div>
  </div>`;
}
function openPR(id){
  const o=S.orders.find(x=>x.id===id);if(!o)return;
  let actions='';
  if(o.status==='pending'){
    actions=`<div class="approve-row"><input id="prApprover" placeholder="ชื่อผู้อนุมัติ">
      <button class="btn ghost" style="color:var(--red);border-color:var(--red)" onclick="decidePR('${id}',false)">ไม่อนุมัติ</button>
      <button class="btn signal" onclick="decidePR('${id}',true)">อนุมัติ</button></div>`;
  }else if(o.status==='approved'){
    actions=`<div class="approve-row"><span class="om" style="flex:1;color:var(--steel)">อนุมัติแล้ว — เมื่อของมาถึง กดรับเข้าสต็อกที่ ${esc(siteName(o.siteId))}</span>
      <button class="btn signal" onclick="receivePR('${id}')">📥 รับของเข้าสต็อก</button></div>`;
  }else if(o.status==='received'){
    actions=`<div class="approve-row"><span class="om" style="color:var(--green)">✓ รับของเข้าสต็อกแล้ว เมื่อ ${new Date(o.receivedTs).toLocaleDateString('th-TH')}</span></div>`;
  }else{
    actions=`<div class="approve-row"><span class="om" style="color:var(--red)">ไม่อนุมัติ${o.approver?' โดย '+esc(o.approver):''}</span></div>`;
  }
  modal(`<div class="mhead"><h3>${o.no}</h3>
      <button class="x" style="margin-left:auto;font-size:14px;color:var(--ink);text-decoration:underline" onclick="printPR('${id}')">พิมพ์ / PDF</button>
      <button class="x" onclick="closeM()">×</button></div>
    <div class="mbody" style="max-height:64vh;overflow:auto">${prDocHTML(o)}${actions}</div>
    <div class="mfoot"><button class="btn x" style="background:none;border:0;color:var(--red);margin-right:auto" onclick="delPR('${id}')">ลบใบนี้</button>
    <button class="btn ghost" onclick="closeM()">ปิด</button></div>`,true);
}
function decidePR(id,ok){
  const o=S.orders.find(x=>x.id===id);
  o.approver=($('#prApprover')?.value||'').trim()||'-';
  o.status=ok?'approved':'rejected';o.decidedTs=Date.now();
  save();renderOrders();openPR(id);toast(ok?'อนุมัติแล้ว':'บันทึกไม่อนุมัติแล้ว');
}
function receivePR(id){
  const o=S.orders.find(x=>x.id===id);
  o.items.forEach(it=>{const p=S.products.find(x=>x.id===it.productId);if(!p)return;
    p.stock=p.stock||{};p.stock[o.siteId]=(p.stock[o.siteId]||0)+(+it.qty||0);
    logHistory({type:'in',productName:p.name,qty:+it.qty,siteId:o.siteId,note:'รับตามใบขอซื้อ '+o.no});});
  o.status='received';o.receivedTs=Date.now();
  save();renderOrders();renderProducts();renderDashboard();openPR(id);toast('รับของเข้าสต็อกแล้ว');
}
function delPR(id){
  const o=S.orders.find(x=>x.id===id);
  modal(`<div class="mhead"><h3>ลบใบขอซื้อ</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody">ลบ <b>${o.no}</b> (${esc(siteName(o.siteId))}) ? ${o.status==='received'?'<div class="hint" style="margin-top:8px">สต็อกที่รับเข้าไปแล้วจะไม่ถูกย้อนกลับ</div>':''}</div>
    <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
    <button class="btn signal" style="background:var(--red);border-color:var(--red)" onclick="doDelPR('${id}')">ลบ</button></div>`);
}
function doDelPR(id){S.orders=S.orders.filter(x=>x.id!==id);save();closeM();renderOrders();toast('ลบใบขอซื้อแล้ว');}
function printPR(id){
  const o=S.orders.find(x=>x.id===id);
  $('#prPrint').innerHTML=prDocHTML(o);
  window.print();
}
function exportOrders(){
  if(!(S.orders||[]).length)return toast('ยังไม่มีใบขอซื้อ');
  const head=['เลขที่','วันที่','สถานะ','โครงการ','ผู้ขอ','ผู้อนุมัติ','สินค้า','จำนวน','หน่วย','ราคา/หน่วย','รวม','หมายเหตุ'];
  const rows=[];
  S.orders.slice().sort((a,b)=>b.ts-a.ts).forEach(o=>o.items.forEach(it=>{
    rows.push([o.no,o.date,OSTAT[o.status],siteName(o.siteId),o.requester||'',o.approver||'',it.name,it.qty,it.unit||'',it.price||'',((+it.price||0)*it.qty)||'',o.note||'']
      .map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(','));
  }));
  dl('ใบขอซื้อ_'+new Date().toISOString().slice(0,10)+'.csv','\ufeff'+head.join(',')+'\n'+rows.join('\n'),'text/csv');
  toast('ส่งออกใบขอซื้อแล้ว');
}

/* ---------- export ---------- */
function dl(name,content,type){
  const b=new Blob([content],{type});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);
}
function exportJSON(){dl('สำรองสต็อก_'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify(S,null,2),'application/json');toast('ดาวน์โหลดไฟล์สำรองแล้ว');}
function renderAll(){renderProducts();renderDashboard();renderSummary();renderSettings();renderCounts();renderOrders();renderSites();renderHistory();}
function importJSON(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d||(!Array.isArray(d.products)&&!Array.isArray(d.sites)))throw 0;
      modal(`<div class="mhead"><h3>นำเข้าข้อมูล</h3><button class="x" onclick="closeM()">×</button></div>
        <div class="mbody">พบข้อมูล: <b>${num((d.products||[]).length)}</b> สินค้า · <b>${num((d.sites||[]).length)}</b> โครงการ · <b>${num((d.orders||[]).length)}</b> ใบขอซื้อ<br><br>
          การนำเข้าจะ <b>แทนที่ข้อมูลทั้งหมด</b> ในเครื่องนี้ ต้องการดำเนินการต่อไหม?</div>
        <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
        <button class="btn signal" onclick='doImport()'>นำเข้าและแทนที่</button></div>`);
      window._imp=d;
    }catch(e){toast('ไฟล์ไม่ถูกต้อง');}
    input.value='';
  };
  r.readAsText(f);
}
function doImport(){
  const d=window._imp;if(!d)return;
  S={sites:d.sites||[],products:d.products||[],history:d.history||[],counts:d.counts||[],
     orders:d.orders||[],prSeq:typeof d.prSeq==='number'?d.prSeq:0,settings:d.settings||{defaultMin:0}};
  save();closeM();renderAll();toast('นำเข้าข้อมูลแล้ว');
}
function exportCSV(){
  const head=['วันที่','ประเภท','สินค้า','ไซต์','ปลายทาง','จำนวน','หมายเหตุ'];
  const lbl={in:'รับเข้า',out:'เบิกออก',adjust:'ปรับยอด',transfer:'โอนย้าย',create:'จัดการ',delete:'ลบ'};
  const rows=S.history.map(h=>[new Date(h.ts).toLocaleString('th-TH'),lbl[h.type],h.productName||'',
    h.siteId?siteName(h.siteId):'',h.toSiteId?siteName(h.toSiteId):'',h.qty||'',h.note||'']
    .map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(','));
  dl('ประวัติสต็อก_'+new Date().toISOString().slice(0,10)+'.csv','\ufeff'+head.join(',')+'\n'+rows.join('\n'),'text/csv');
  toast('ส่งออกประวัติแล้ว');
}
function exportCounts(){
  if(!(S.counts||[]).length)return toast('ยังไม่มีรอบนับ');
  const head=['วันที่นับ','โครงการ','สถานะ','สินค้า','ยอดระบบ','นับได้','ส่วนต่าง','หมายเหตุ'];
  const rows=[];
  S.counts.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(r=>{
    for(const pid in r.items){
      const p=S.products.find(x=>x.id===pid);const sys=countSystem(r,pid);const c=r.items[pid];
      rows.push([r.date,siteName(r.siteId),CSTAT[r.status],p?p.name:'(ลบแล้ว)',sys,c,c-sys,r.note||'']
        .map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(','));
    }
  });
  dl('รอบนับสต็อก_'+new Date().toISOString().slice(0,10)+'.csv','\ufeff'+head.join(',')+'\n'+rows.join('\n'),'text/csv');
  toast('ส่งออกผลการนับแล้ว');
}
function resetAll(){
  modal(`<div class="mhead"><h3>ล้างข้อมูลทั้งหมด</h3><button class="x" onclick="closeM()">×</button></div>
    <div class="mbody">ลบสินค้า ไซต์งาน และประวัติทั้งหมดออกจากเครื่องนี้? <b>ย้อนกลับไม่ได้</b><br>แนะนำให้สำรองข้อมูลก่อน</div>
    <div class="mfoot"><button class="btn ghost" onclick="closeM()">ยกเลิก</button>
    <button class="btn signal" style="background:var(--red);border-color:var(--red)" onclick="doReset()">ล้างทั้งหมด</button></div>`);
}
function doReset(){S={sites:[],products:[],history:[],counts:[],orders:[],prSeq:0,settings:{defaultMin:0}};save();closeM();renderProducts();renderDashboard();renderSites();renderCounts();renderOrders();toast('ล้างข้อมูลแล้ว');}

/* ---------- modal / toast ---------- */
function modal(html,wide){const m=$('#modal');m.className='modal'+(wide?' wide':'');m.innerHTML=html;$('#scrim').classList.add('on');}
function closeM(){$('#scrim').classList.remove('on');}
$('#scrim').onclick=e=>{if(e.target===$('#scrim'))closeM();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
let toastT;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200);}

/* ---------- seed ---------- */
function seed(){
